: "当班未投出而需再次投递的邮件，可直接在邮件封面上标注“再”或“再投”字样。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 47, "t": "判断题", "q": "经一次按址投递仍未投出的，邮件应该让收件人自取。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 48, "t": "判断题", "q": "同一邮件寄件人可以申请改址2次。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 49, "t": "判断题", "q": "所有的快递包裹、特快专递邮件因投递的特殊性，不支持改址或退回操作。（ ）", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 50, "t": "判断题", "q": "收件人外出、收件人迁移，新址待查、原址查无此人，下班再问都是邮件再投的原因。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 51, "t": "判断题", "q": "留存邮件包括再投邮件和存局邮件。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 52, "t": "判断题", "q": "邮件退回原因一般分为无法投递和邮件撤回两种。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 53, "t": "判断题", "q": "改寄邮件只需要收件人提出申请，不需要经过邮政企业审核。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 54, "t": "判断题", "q": "改寄邮件的原因包括收件人拒收邮件或者拒付应付的费用。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 55, "t": "判断题", "q": "普通给据邮件在对应投递清单相关签收栏内无需批注“再投”字样或加盖“再投”戳记。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 56, "t": "判断题", "q": "用户领取邮件保管期满，收件人仍未领取的可以作为无法投递邮件。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 57, "t": "判断题", "q": "遇收件人办理相关地址迁移手续后，投递生产机构应对普通包裹的进口邮件改寄新址，时间期限为3个月。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 58, "t": "判断题", "q": "存局状态一经确定后，应选择“改退”批条据实填写，其他处理手续同改退邮件。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 59, "t": "判断题", "q": "因收件人原因，经1次有效按址投递，仍未投出，需留存投递生产机构保管待投。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 60, "t": "判断题", "q": "改退批条批注后应加盖经手人名章，送主管人员审核签章。无误后，在批条右侧规定位置加盖当班投递日戳。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察寄递业务知识相关知识。", "sec": "寄递业务知识"}, {"id": 1, "t": "单选题", "q": "数字社会中，用户已经离不开各种必须的应用软件，一些应用软件虽然是在用户知情的前提下收集用户个人信息，但很多时候用户都是被逼无奈地同意。比如，用户在下载 APP后，要么同意其收集个人信息，要么放弃注册使用。这种貌似______的“二选一”，实际上是通过霸王条款限制了用户的选择自由。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 均等", "B. 自由", "C. 恰当", "D. 公平"], "a": "B", "e": "逻辑填空题。空后“实际上”表转折，前后语义相反，横线应表达“不限制选择” 的含义，对应 B 项。A 项，“均等”反义应为“不平均”，不符合语义，排除；C 项，“恰 当”反义应为“不适合”，不符合语义，排除；D 项，“平等”反义应为“不平等”，不符 合语义，排除。故正确答案为 B。", "sec": "行测"}, {"id": 2, "t": "单选题", "q": "面对北宋王朝百余年的积贫积弱，怀“回天转地”之气概、视“天下大治”为己任的王安石，从“继道而行”“以道求治”的哲学立场和政治观念出发，借论周公之政畅抒其立法施治的观点，其______显然不仅仅是治必有法，而更在于强调治须“良法”。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 缘由", "B. 动机", "C. 设想", "D. 意图"], "a": "D", "e": "逻辑填空题。空前“其”指代上文王安石“借论周公之政畅抒其立法施治的观点” 可知，该空应体现王安石提出该观点的目的。A 项，“缘由”意思是指造成某种结果或一件 事情发生的原因，不符合文意，排除；B 项，“动机”是推动从事某种行为的念头，指做某 事的动力起源，不符合文意，排除；C 项，“设想”指想象、假想、着想、考虑的意思，不 符合文意，排除；D 项，“意图”指是希望达到某种目的的打算，符合文意，当选。故正确 答案为 D。", "sec": "行测"}, {"id": 3, "t": "单选题", "q": "音乐诗画《听此青绿——乐咏千里江山》以十三幅______图景展现传世名画《千里江山图》中的景观和风情，借鉴《高山流水》《渔舟唱晚》《梅花三弄》等古曲的艺术表达，融合编钟、箜篌、筑等民族乐器和西洋铜管乐，加入绘画、书法、意境化舞蹈等表现方式，为千山万壑、江河交错的盛景注入______而深邃、浑厚而轻盈的悠远神韵。依次填入划横线部分最恰当的一项是（ ）。", "opts": ["A. 壮丽 磅礴", "B. 华丽 壮阔", "C. 宏伟 清雅", "D. 绮丽 恢宏"], "a": "A", "e": "逻辑填空题。第一空，搭配“图景”。A 项，“壮丽”意思是健壮美丽，宏壮美 丽，多指山川，建筑，图景，场面等，宏伟瑰丽，符合文意，当选；B 项，“华丽”意思是 事物美丽而有光彩华丽，多用于形容服饰、建筑、装饰等方面，不符合文意，排除；C 项， “宏伟”指雄伟而宽大，多指规模、计划等，不符合文意，排除；D 项，“绮丽”意思是形 容辞藻华丽，也指鲜艳美丽，多用来形容风景，不符合文意，排除。故正确答案为 A。", "sec": "行测"}, {"id": 4, "t": "单选题", "q": "金秋时节，五彩斑斓的丰收画卷在广袤大地徐徐展开。14亿人的饭碗，依赖有限耕地上的产出，良种的重要性不言而喻。“种地不选种，累死落个空”“好种多打粮”“千算万算，不如良种合算”……一句句______而直白的农谚，道出一粒小小的种子如何承载粮食安全这“国之大者”。当良种与土地相遇，丰收的希望便开始______。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 朴陋 酝酿", "B. 朴实 滋生", "C. 俭朴 点燃", "D. 朴素 孕育"], "a": "D", "e": "逻辑填空题。第一空与“直白”并列，并搭配“农谚”。A 项，“朴陋”指粗俗鄙 陋，不符合文意，排除；B 项，“朴实”不加修饰，实实在在，符合文意，保留；C 项，“ 俭朴”节省不浪费，不符合文意，排除；D 项，“朴素”指质朴；无文彩，符合文意，保留 。第二空，搭配“希望”。B 项，“滋生”指繁衍、生育，多搭配贬义词，不符合文意，排 除；D 项，“孕育”指怀胎生育，比喻在既存的事物酝酿着新事物，符合文意，当选。故正 确答案为 D。", "sec": "行测"}, {"id": 5, "t": "单选题", "q": "湿地被誉为“地球之肾”，和森林、海洋一起，构成了地球的三大生态系统，它在净化水质、______水源、调节气候、______生物多样性等方面，具有不可替代的生态价值。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 滋养 维持", "B. 充沛 助力", "C. 保护 衡量", "D. 涵养 维护"], "a": "D", "e": "逻辑填空题。第一空搭配水源。A 项，“滋养”指滋补保养，供养，不搭配水源， 排除；B 项，“充沛”指充足，一般用法为水源充沛，不用作充沛水源，用法错误，排除；C 项，“保护”指保卫、照顾，不搭配水源，排除；D 项，“涵养”指修养、滋润养育、培养 、积蓄等意思，可搭配水源，当选。代入第二空验证，维护生物多样性为固定搭配。故正确 答案为 D。", "sec": "行测"}, {"id": 6, "t": "单选题", "q": "党的十八大以来，经过艰苦卓绝的努力，我们打赢了人类历史上最大规模脱贫攻坚战；经济总量从 54 万亿元提升到114 万亿元，占世界经济的比重从 11.3％提升到 18.5%；港珠澳大桥通车_______，北斗卫星导航系统全面开通，第三艘航空母舰下水……一个个改天换地的创举，一件件惊天动地的大事，谱写了时代变迁的_________乐章，拓展了历史前行的宽阔航道。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 运行 宽宏", "B. 运营 恢宏", "C. 运转 宏伟", "D. 运载 宏大"], "a": "B", "e": "逻辑填空题。第一空，横线被“港珠澳大桥”限定并通过空后解释“北斗卫星导航 系统全面开通，第三艘航空母舰下水……”，得知横线处应体现“港珠澳大桥”可以通车使 用之意。A 项，“运行”指交通工具不停的运转，符合文意，保留；B 项，“运营”指运行 和营业，符合文意，保留；C 项，“运转”有规则地运行转动，文中主体是“港珠澳大桥” 没有体现大桥在转动，不符合文意，排除；D 项，“运载”指装载运送，文中没有体现要装 载货物之意，不符合文意，排除。第二空，根据空后解释“拓展了历史前行的宽阔航道”横 线处应体现非常广阔，宽广之意。A 项，“宽宏”指心胸开阔,度量大，文中主体不是人，不 符合文意，排除；B 项，“恢弘”指阔大，宽广，宽阔，符合文意，当选。故正确答案为 B 。", "sec": "行测"}, {"id": 7, "t": "单选题", "q": "中华民族的历史是各民族共同创造的。其间汉族的发展也是因为有其他民族______、______而不断进步。汉族人口多，原本是由许多少数民族混血形成的，故汉族的贡献也包含了许多少数民族的贡献。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 参加 融合", "B. 凝聚 交融", "C. 汇合 创造", "D. 参与 融入"], "a": "D", "e": "逻辑填空题。根据前文“中华民族的历史是各民族共同创造的”和后文“汉族的贡 献也包含了许多少数民族的贡献”可知，汉民族的发展中也包含其他民族的作用，故汉民族 的发展也需要其民族的“加入”，该空应体现出“加入”之意。A 项，“参加”指参与、加 入，保留；B 项，“凝聚”聚集；积聚，无“加入”的含义，排除；C 项，“汇合”指聚 集，会合，不符合文意，排除；D 项，“参与”意思是介入，参加，保留。第二空与第一空 形成正向并列，也应体现出“加入”之意。A 项，“融合”指认知、情感或态度倾向融为一 体，不符合文意，排除。故正确答案为 D。", "sec": "行测"}, {"id": 8, "t": "单选题", "q": "在当今世界，科学家利用基因编辑技术，为“复活”灭绝物种______了生态修复的新途径，但挽救濒危物种，保护生物多样性才是核心要义，人类需要采取组合措施来遏制和______生物多样性丧失的严峻形势。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 发明 拯救", "B. 开拓 扭转", "C. 发现 抢救", "D. 开辟 缓解"], "a": "B", "e": "逻辑填空题。第一空，搭配“新途径”。A 项，“发明”指创造出前所未有的新事 物，常与具体事物搭配，与“新途径”搭配不当，排除；B 项“开拓”指开辟、扩展，C 项 “发现”指经过研究探索，看到或找到前人没有看到或找到的事物或规律，D 项“开辟”指 开创、拓展，均与“新途径”搭配恰当，保留。第二空，搭配“严峻形势”，且根据“采取 组合措施来遏制”可知，横线处词语应体现不让“严峻形势”继续发展下去，且语义程度较 重。B 项“扭转”指纠正或改变某种现象或局面，符合文意，当选；C 项“抢救”指在紧急 危险的情况下迅速救护，与“严峻形势”搭配不当，排除；D 项“缓解”指使矛盾缓和或程 度减轻，置于此处程度较轻，排除。故正确答案为 B。", "sec": "行测"}, {"id": 9, "t": "单选题", "q": "我国已经形成了相对完善的中药质量标准控制体系，______了中药材源头种植到终端产品流通的各个环节。医院积极利用现代制药新技术______了传统医院中药制剂的给药剂型和给药方法，走科学化的特色制剂发展方式，满足群众多元化用药需求。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 包揽 改革", "B. 囊括 改成", "C. 涵盖 改变", "D. 蕴涵 改换"], "a": "C", "e": "逻辑填空题。第一空，根据“中药材源头种植到终端产品流通的各个环节”，因此 要体现中药质量标准控制体系里包含括了中药的各个环节。A 项，“包揽”指全部承担，不 符合文意，排除；B 项，“囊括”指包含了一切事物，符合文意，保留；C 项，“涵盖”指 包括、包容、覆盖，符合文意，保留；D 项，“蕴涵”指包含、积聚、含蓄，多搭配思想、 哲理，不符合文意，排除。第二空，该空搭配“给药剂型和给药方法”，体现新技术对传统 制剂的影响。B 项，“改成”指将一种用途和目的改为另一种用途和目的，不符合文意，排 除；C 项，“改变”符合文意，当选。故正确答案为 C。", "sec": "行测"}, {"id": 10, "t": "单选题", "q": "据介绍，光学产品的装配和调试，直接影响成像效果。高精密复杂光学系统对性能有严苛的要求，不仅要实现狭小空间内超精密光学镜片的精密装调，还需______光学系统的稳定性。高精密复杂光学系统的装配和调试，往往靠经验丰富的匠人______精密仪器完成，存在装调难度大、周期长、制造加工一致性差等问题。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 维持 制作", "B. 确认 搭配", "C. 确保 配合", "D. 保持 组合"], "a": "C", "e": "逻辑填空题。第一空根据“不仅还”可知表递进，要和“实现”有关系，且程度加 重。A 项，“维持”指使继续存在，不符合文意，排除；B 项，“确认”明确承认，不符合 文意，排除；C 项，“确保”指确实保证，对应严苛要求，符合文意，当选；D 项，“保持 ”指维持下去，不减弱或消失，不符合文意，排除。故正确答案为 C。", "sec": "行测"}, {"id": 11, "t": "单选题", "q": "20 世纪下半叶兴起的信息通信技术等高新科技，有两个明显特征，一是与每个人的日常生活______，无人能须臾脱离高新科技的影响；二是高新科技发展速度______，科技风险随之增加且难以预测。科技创新活动一旦脱靶，将造成不可逆的负面影响甚至巨大灾难。为此，需努力控制科技伦理问题的出现，避免被动治理局面。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 休戚与共惊人", "B. 一脉相连飞快", "C. 息息相关 迅猛D、如影随形 迅速C响”可知，该空应体现高新科技与日常生活紧密相关。A 项，“休戚与共”指彼此之间忧喜祸福都共同承受，文中并无利害关系，排除；B 项，“一脉相连”侧重于从同一血统、派别世代相承流传下来，不符合文意，排除；C 项，“息息相关”形容彼此的关系非常密切，符合文意，保留；D 项，“如影随形”形容关系密切，符合文意，保留。第二空，根据后文解释说明的信息，“科技风险随之增加且难以预测”可知，该空应体现速度发展快。C 项，“迅猛”强调突然和强烈的速度，符合文意，保留；D 项，“迅速”侧重于快速和高效的性质，不符合文意，排除。故正确答案为 C。"], "a": "", "e": "逻辑填空题。第一空，根据后文解释说明的信息，“无人能须臾脱离高新科技的影", "sec": "行测"}, {"id": 12, "t": "单选题", "q": "短视频已成为互联网的底层应用。据某调查结果显示，短视频用户如今 10.12 亿，青年群体是绝对主力军。作为互联网原住民一代，青年会被短视频“集体______”并不奇怪：“短”______了信息时代消费内容快餐化的需求，而“视觉化”带来的生动直观、即时满足等特点，______了对年青一代沉浸式体验的“注意力抓取”。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 攻陷 迎合实现", "B. 沦陷 契合 兑现", "C. 沦陷 逢迎 达到", "D. 攻陷 满足 弥补"], "a": "A", "e": "逻辑填空题。第一空要体现青年被短视频占据的一种结果。A 项、D 项，“攻陷” 指占领，符合文意，保留；B 项、C 项，“沦陷”指沦落，也指丧失疆土，不符合文意，排 除。第二空不好排除，第三空，要体现“视觉化”带来的结果。A 项，“实现”指事件或状 态的发生，符合文意，当选；D 项，“弥补”指补偿、赔偿、填补，文中并没有体现要“补 ”，排除。故正确答案为 A。", "sec": "行测"}, {"id": 13, "t": "单选题", "q": "暗物质是在物质起源和宇宙______过程中具有重要地位的物质。它约占整个宇宙物质质量的 85%，它看不见、摸不着，几乎不和任何物体发生作用。为了捕捉到这______又“腼腆”的暗物质，21 世纪以来，国际上______开展了 20 多个探测实验。人们相信：谁先揭开它的面纱，谁就将促成人类对物质世界和宇宙认识的又一次重大飞跃。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 蜕变 严肃持续", "B. 改变 冷酷 及时", "C. 运动 神奇 广泛", "D. 演化 神秘 相继"], "a": "D", "e": "逻辑填空题。第一空不易排除，看第二空，根据前文“它看不见、摸不着”可知， 第二空应体现不清楚的意思。A 项，“严肃”指郑重，认真，不符合文意，排除；B 项，“ 冷酷”指对待别人冷漠残酷，不符合文意，排除；C 项，“神奇”指非常奇妙，符合文意， 保留；D 项，“神秘”指高深莫测，超乎寻常理性认识之外，符合文意，保留。第三空，根 据空后内容“开展了 20 多个探测实验”，该空应与“开展”搭配，且要体现数量多连续出 现的意思。C 项，“广泛”指范围大，面积广，与“开展”搭配不当，且无法体现连续的意 思，排除；D 项，“相继”指一个跟着一个，符合文意，当选。故正确答案为 D。", "sec": "行测"}, {"id": 14, "t": "单选题", "q": "“巴赫金对话”理论的概念经过西方社会学的发展，被______成一种克服现代性危机、重构认同与共同体的有效手段。具体到政治传播的______里，强调政府与公众的“垂直对话”，其本质是政府紧密围绕民生民意与社会需求，通过及时的信息公开______不确定性，弥合不同意见并最终确认共同价值的手段。依次填入划横线部分最恰当的一项是（ ）。", "opts": ["A. 推演 领域消灭", "B. 演绎 语境 消弭", "C. 论证 情境 消损", "D. 归纳 环境 消解"], "a": "B", "e": "逻辑填空题。第一空，根据前文可知概念经过发展变成了有效手段，空处要体现演 变的意思。C 项，“论证”指作者能够用论据来证明论点的方法，不符合文意，排除；D 项，“归纳”意思是由一系列具体的事实概括出一般的原理，不符合文意，排除。第二空不 好排除。看第三空，根据选项提示可知，空处要表达意思为让不确定性消失的意思。A 项， “消灭”着重指失去，多是逐渐的，对象常见的事物，如声音、光亮、精力、本领、心情 等，不符合文意，排除；B 项，“消弭”指清除、消除某些不好的事情，符合文意，当选。 故正确答案为 B。", "sec": "行测"}, {"id": 15, "t": "单选题", "q": "中国汉字经历岁月洗礼，______，如今已发展出成熟而多样的字体系统。随着科学技术的______，激光照排技术替代活字印刷，让汉字的传播方式发生了革命性变化，而数字媒体的______使汉字字体的设计迎来了质的飞跃。当我们以全新的视角重新审视汉字时，会发现其创新的设计方法如万花筒般千姿百态、绚丽多彩。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 久久为功提升 创新", "B. 薪火相传更迭 介入", "C. 厚积薄发 普及拓展", "D. 历久弥新 增长融合"], "a": "B", "e": "逻辑填空题。第一空，根据文意可知，横线处所填词语要体现出中国汉字经过长时 间的发展和传承。A 项，“久久为功”强调要持之以恒，长时间地努力，符合文意，保留；B 项，“薪火相传”原以柴烧尽，火种仍可传承，比喻学问和技艺代代相传，符合文意，保 留；C 项，“厚积薄发”形容只有准备充分才能办好事情，强调的是积累，不符合文意，排 除；D 项，“历久弥新”指经历长久的时间而更加鲜活，更加有活力，更显价值，符合文 意，保留。第二空，搭配“技术”。A 项，“提升”无法与“技术”搭配，排除；B 项，“ 更迭”可以与“技术”搭配，当选；D 项，“增长”无法与“技术”搭配，排除。故正确答 案为 B。", "sec": "行测"}, {"id": 16, "t": "单选题", "q": "历史上的关羽之所以经历由人到神的______跃升，从根本上讲，是因为他的道德品行和人格气质满足了不同时代价值信仰重构的精神需求，即在关公身上蕴含着中华优秀文化______的核心价值。那么这种核心价值是什么？主张刚、毅、直、俭者有之，认为孝、悌、忠、信者有之，可谓众说多歧，______。依次填入划横线部分最恰当的一项是（ ）。", "opts": ["A. 改变 一脉相承 鞭辟入里", "B. 擢拔 一以贯之 莫衷一是", "C. 提携 一如既往各执一词", "D. 擢用 自始至终众口难调"], "a": "B", "e": "逻辑填空题。第一空、第二空不好入手，突破口在第三空，第三空空前出现“，” 表正相并列，并列前后语义相近且感情色彩一致，应与“众说多歧”语义相近，体现出民众 对这种核心价值的不同理解。A 项，“鞭辟入里”指能透彻说明问题，切中要害，没有体现 理解不一致的意思，不符合文意，排除；D 项，“众口难调”指吃饭的人多，很难适合每个 人的口味，比喻不容易使所有的人都满意。文中强调的是对于核心价值人们的观点不同，不 符合文意，排除；B 项，“莫衷一是”指不能决定哪个是对的，形容意见分歧，没有一致的 看法，符合文意，保留；C 项，“各执一词”指各自坚持一种说法，形容意见不统一，符合 文意，保留。再看第一空，根据空前“经历由人到神的”以及空后“跃升”可知，第一空应 体现关羽从人到神的转变过程。B 项，“擢拔”指选拔提升，符合文意，当选；C 项，“提 携”指牵扶，携带；照顾，扶持；侧重于在事业上扶植后辈，不符合文意，排除。故正确答 案为 B。", "sec": "行测"}, {"id": 17, "t": "单选题", "q": "到 2030 年，我国数字人市场规模将达 2700 亿元。数字人应用的多元拓展，得益于我国数字技术的不断进步和产业布局的持续完善。我国数字人产业上下游均已具备一定规模的企业集群，有较深厚的技术积累。看上游，成像设备产品已发展成熟，智能传感器等关键技术正被集中攻坚；看下游，应用领域加速从文娱行业向制造业、服务业延伸。同时，数字人产品制作企业高速发展、相关服务平台正加快打造，数字人制作水平明显提升，数字人产业将加快走向成熟。对这段文字理解不正确的是（ ）。", "opts": ["A. 数字人应用场景将更为广泛", "B. 目前数字人产业仍处在成长期", "C. 我国数字人市场发展前景良好", "D. 智能传感器等关键技术已有重大突破"], "a": "D", "e": "细节查找题。将选项与文段一一对应。本题为选非题。A 项，由文段“数字人应用 的多元拓展，……应用领域加速从文娱行业向制造业、服务业延伸”可知，符合文意，排 除；B 项，由文段“数字人产业将加快走向成熟”，符合文意，排除；C 项，由文段“到 2030 年，我国数字人市场规模将达 2700 亿元”，符合文意，排除；D 项，由文段“智能传 感器等关键技术正被集中攻坚”，可知，文段是现在时，选项“已”将来时，偷换时态，不 符合文意，当选。故正确答案为 D。", "sec": "行测"}, {"id": 18, "t": "单选题", "q": "伴随着城市化的快速发展，今天的少年儿童与乡土田园渐行渐远。如何开展既符合时代特色又“接地气”的耕读教育？这道“考题”，考验的是学校与教师勇于创新的意识、因地制宜的本领。很多学校意识到：“耕”离不开土地和自然，“读”重在学习广博有趣的各类知识、涵养自强不息的人格品德、树立报效国家的崇高志向。于是，越来越多的学生被老师们带到原野田间，越来越多的课堂开设在了大自然里。学生们饶有兴致地学习农耕知识、活泼健朗地舒展心胸情怀，耕读教育的真正意义由此得以实现。对这段文字概括最恰当的一项是（ ）。", "opts": ["A. 耕读为本，计之久远", "B. 劳动教育能够激发内生动力", "C. 古为今用，耕读传家", "D. 在“土味”课堂实现耕读教育的价值"], "a": "D", "e": "主旨概括题。文段首先提出背景，指出儿童与乡土田园远离，接着通过问句引出耕 读，回答是重点，后文通过“于是”表总结，引出回答重点，学生应该去原野田间开展学 习，实现教育意义，对应 D 项。A 项，“耕读为本，计之久远”，强调耕读为主，是长久大 计，非重点，排除；B 项，“激发内生动力”，无中生有，排除；C 项，“古为今用，耕读 传家”，无中生有，排除。故正确答案为 D。", "sec": "行测"}, {"id": 19, "t": "单选题", "q": "单选题19、风险 对于 （ ） 相当于 制度 对于 （ ）。", "opts": ["A. 巨大 激进", "B. 信用 管理", "C. 规避 完善", "D. 减少 缺少"], "a": "C", "e": "A项：巨大的风险，二者为偏正关系，但激进一般不用于形容制度，前后逻辑关系不 一致，排除；B项：风险和信用没有明显的逻辑关系，排除；C项：规避风险和完善制度，均 为动宾关系，并且都是现代企业所要遵循的准则，前后逻辑关系一致，当选；D项：减少风 险，二者为动宾关系，但缺少制度并非固定搭配，前后逻辑关系不一致，排除。故正确答案 为C。", "sec": "行测"}, {"id": 20, "t": "单选题", "q": "冰冻圈主要分布在地球两极和中低纬度的高山地区，在气候系统和气候变化中扮演着重要角色。极地温度对于全球的影响力也许比我们想象中要大得多。可以说，极地温度就像一个遥控器，控制着地球上其他地方的“恒定”温度。卫星数据显示，北极的浮冰正在加速消融、减少。冰越来越少，意味着地球能够反射到太空的阳光变少了，也意味着更多深海海水被暴露出来去吸收阳光而变暖，地球会变得更暖，冰会融化得更快，而且很难恢复，如此往复，会放大全球的温度变化情况。与这段文字的意思相符的一项是（ ）。", "opts": ["A. 极地和高山地区地表上存在多年冰体", "B. 北极冰冻圈的加速融化会导致全球变暖", "C. 极地温度决定着地球上其他地方的温度", "D. 极地冰冻圈的融化速度慢于中低纬度高山冰冻圈"], "a": "B", "e": "细节查找题。将选项与原文一一对应。A 项，“多年冰体”无中生有，排除；B 项，对应“北极的浮冰正在加速消融、减少……地球会变得更暖”，符合原文，当选；C 项，对应“极地温度就像一个遥控器，控制着地球上其他地方的‘恒定’温度”，扩大概 念，排除；D 项，强加对比，排除。故正确答案为 B。", "sec": "行测"}, {"id": 21, "t": "单选题", "q": "如今无论什么季节，任何水果都能随时买回家尝鲜，很多人对此并不赞同，理由是反季水果的种植过程中总会有不利于健康的因素，因此他们在选购水果的时候，会侧重购买当季、当地产的水果。但是，果蔬中是否存在不利于健康的因素，与自然栽种还是大棚栽种没有必然联系。随着现代化农业技术的推广应用，大棚栽种水果技术越来越成熟，所有的保鲜剂、食品添加剂、植物生长调节剂，只要是国家相关标准允许使用的，且在规定的用量下，对人体健康是没有危害的。这段文字旨在说明（ ）。", "opts": ["A. 人们倾向于购买当季当地产的水果", "B. 反季水果在种植过程中会产生不利于健康的因素", "C. 水果是否存在不利于健康的因素与栽种方式无关", "D. 应加强现代农业技术的推广应用，减少添加剂对健康的危害"], "a": "C", "e": "主旨概括题。文段首先提出反季水果有不利因素，接着通过“但是”表转折，强调 水果是否存在不利因素与栽种方式没有必然联系，接着继续论述技术的可靠性，解释说明水 果和栽种方式没有必然联系，对应 C 项。A 项，转折前内容，非重点，排除；B 项，文段没 有强调“会产生不利于健康的因素”，无中生有，排除；D 项，文段说明技术对人体健康没 有危害，无中生有，排除。故正确答案为 C。", "sec": "行测"}, {"id": 22, "t": "单选题", "q": "神经科学领域已有研究揭示脑衰老的分子、细胞、器官、系统多层级多种生物学特征，它们相互依赖、彼此互为联系，共同构成脑衰老特征及其发生机制的复杂性。此外，该领域新技术和新方法的应用也使研究内容得到极大丰富与发展。在对抗衰老过程中维持脑健康及其功能，是一项挑战，运动可以通过改善脑衰老的生物学特征及生理功能，促进脑的相关慢性疾病患者的脑的可塑性。因此，临床实践中运动干预可作为补充策略，改善衰老人群及相关慢性疾病患者的脑健康。最适合做这段文字标题的是（ ）。", "opts": ["A. 运动促进脑生长：加强认知与记忆", "B. 运动影响脑健康：运动疗法有前景", "C. 运动改变脑结构：挑战性与安全性", "D. 运动干预脑衰老：新进展与再认识"], "a": "D", "e": "标题选择题。尾句“因此”表总结，重点强调了“运动干预”，对应 D 项。A 项和 B 项以及 C 项，无“运动干预”主体，不符合文意，排除。故正确答案为 D。", "sec": "行测"}, {"id": 23, "t": "单选题", "q": "新农人，不同于传统农民，也异于新型职业农民，他们多是从城市回流农村的新群体。如果说，过去大部分年轻人以跳出农门为奋斗目标之一的话，近年来，跳回农门正在成为新时尚。新农人带来了新技术、新商业模式和运营理念，创造了新的就业机会和空间，丰富并拓展了农村经济业态。但在现实中，新农人融入农村社会网络、激活产业网络并没有那么容易。不少人虽然在物理意义上返乡回乡了，但在社会关系上仍是“异乡人”。正如不少调研所显示的，新农人不了解农村，不知道如何与农民打交道，难以有效嵌入当地产业网络开展分工合作。这段文字主要说明了（ ）。", "opts": ["A. 新农人，回得去并不等于融得进", "B. 时代呼唤更多新农人回农村创业", "C. 新农人具备新理念，掌握新技术", "D. 新农人需补短板，否则创业难成"], "a": "A", "e": "主旨概括题。文段首先提出新农人概念，接着提出新农人带来了新技术，新模式和 运营理念，后通过“但”表转折，强调目前新农人存在的问题，即使物理上回了乡，关系上 仍然是“异乡人”，最后通过调研论证新农人存在的问题，对应 A 项。B 项，“时代呼唤更 多新农人回农村创业”，无中生有，排除；C 项，“具备新理念，掌握新技术”，为转折之 前，非重点，排除。D 项，为主观对策表述，转折后论述的是问题，排除。故正确答案为 A 。", "sec": "行测"}, {"id": 24, "t": "单选题", "q": "元素周期表是化学科学的基石，在化学发展史上具有里程碑意义。作为元素周期表中的“住户”，元素的发现几乎与人类文明相伴。像铁、铜、金、银等容易以单质形态存在的元素发现得最早，之后从铁器时代到青铜时代，从炼金术到电解技术，从核辐射到核裂变，______，新“住户”不断占据各自的位置。直至今日，仍然有新的元素被发现（合成），而且关于元素在生命起源、物种进化中的作用以及元素如何精准调控材料性能及生命过程等仍然是科学家们非常关注的科学问题。填入划横线处最恰当的一句是（ ）。", "opts": ["A. 元素周期表逐步被填充并扩展", "B. 元素周期表被有序地组织起来", "C. 元素周期表得到较完美的呈现", "D. 元素在周期表不同行列排列着"], "a": "A", "e": "语句衔接题。横线在段中，起承上启下的作用。横线前文首先介绍了元素周期表的 作用与重要意义，接着阐述元素周期表中元素的发现与人类相伴，并列举相关元素由易发现 到难发现的过程，横线之后“新‘住户’不断占据各自的位置”说明横线处应体现元素在由 易到难的发现过程中逐渐列入周期表的含义，对应 A 项。B 项，C 项和 D 项均体现不出“ 新‘住户’不断占据各自的位置”，不符合文意，排除。故正确答案为 A。", "sec": "行测"}, {"id": 25, "t": "单选题", "q": "目前，学术界对数字经济在促进乡村产业振兴中的实际作用方面已有一定研究，但对数字经济影响乡村产业振兴的内在机制等尚缺乏系统的理论阐释，由此可能夸大或弱化数字经济在乡村产业振兴中的作用，甚至有可能导致政策制定的偏差。因此，我们拟在厘清数字经济对乡村产业振兴的关键作用基础上，从效率提升、产业变革、结构优化三个角度剖析数字经济促进乡村产业振兴的内在机制，并立足现实提出相应的实现路径。这段文字接下来最可能介绍（ ）。", "opts": ["A. 数字经济促进乡村产业振兴的方法", "B. 数字经济对乡村产业振兴的关键作用", "C. 数字经济如何使乡村产业振兴的效率得以提升", "D. 借助数字经济促进乡村产业振兴的过程中有哪些现实制约"], "a": "B", "e": "下文推断题。延续主干话题，文段开头讲由于对数字经济影响乡村产业振兴的内在 机制缺乏理论阐释，可能会夸大或弱化数字经济的作用，尾句得出结论，我们要厘清数字经 济对乡村振兴的关键作用，即文段主干话题为“数字经济对乡村产业振兴的关键作用”，对 应 B 项。A 项、C 项和 D 项，均与文段主干话题无关，排除。故正确答案为 B。", "sec": "行测"}, {"id": 26, "t": "单选题", "q": "碳纤维是由有机纤维经过一系列热处理转化而成、含碳量高于 90%的无机高性能纤维，是一种力学性能优异的新材料，其比重不到钢的五分之一。碳纤维树脂复合材料抗拉强度是钢的 7 至 9 倍，还具有出色的耐热性、优秀的抗腐蚀性与抗辐射性。以碳为主要原料，以碳纤维复合材料、石墨烯等为核心的新一代复合材料是 21 世纪最具应用前景的新材料，可应用于飞机结构材料、人工韧带等身体代用材料以及火箭外壳、工业机器人等领域，但碳纤维复合材料发展也面临着高质量树脂基材缺乏等发展瓶颈问题。根据这段文字，下列说法正确的是（ ）。", "opts": ["A. 碳纤维是一种含碳量高的有机纤维", "B. 碳正成为21 世纪的主导型先进材料", "C. 碳纤维树脂复合材料的抗拉强度优于钢", "D. 碳纤维树脂复合材料是一种最耐热且最坚硬的材料"], "a": "C", "e": "细节查找题。将选项与文段一一对应。A 项，由文段“碳纤维是由有机纤维经过一 系列热处理转化而成、含碳量高于 90%的无机高性能纤维”可知，碳纤维不是有机纤维，而 是无机高性能纤维，不符合文意，排除；B 项，“碳正成为 21 世纪的主导型先进材料”无 中生有，排除；C 项，由文段“碳纤维树脂复合材料抗拉强度是钢的至 9 倍”可知，“碳纤 维树脂复合材料的抗拉强度优于钢”，符合文意，当选；D 项，“最耐热”“最坚硬”表述 过于绝对，不符合文意，排除。故正确答案为 C。", "sec": "行测"}, {"id": 27, "t": "单选题", "q": "长期以来，我们将沙质土壤景观统称为“沙漠”，常与荒凉、沙尘暴等相联系，甚至认为是地球的皮肤癌。但事实上，“山水林田湖草沙”是生命共同体。沙地依靠渗入地下深处的土壤水分，长出了稀疏的乔木、各类灌木及草本，形成了疏林草原、灌丛草原景观，______。其生物多样性——如毛乌素沙地是鄂尔多斯高原植物与动物集中分布区，几乎涵盖了鄂尔多斯全部物种。但毕竟受降水限制，大部分沙地土壤水分尚未达到较密的森林生长的基本水分要求，但局部水分条件较好的地区亦有分布。沙漠同样如此，特别是沙漠湖泊湿地，是沙漠区宝贵的生物资源宝库。填入划横线部分最恰当的一句是（ ）。", "opts": ["A. 也具有重要的生态价值", "B. 形成重要的防风固沙屏障带", "C. 构成了自然生态系统必不可少的要素", "D. 其生物多样性往往高于同地带植被区"], "a": "D", "e": "语句衔接题。横线出现在文段中间，应起到承上启下的作用。文段开篇引出沙质土 壤的话题，并指出我们通常认为其是地球的皮肤癌，紧接着通过转折词“但”引出其重要 性，即“山水林田湖草沙”是生命共同体，并说明沙地能长出乔木、各类灌木及草本，可以 形成疏林草原等景观，横线后通过“如”举出毛乌素沙地的例子，指出在水分条件较好的地 区几乎涵盖了鄂尔多斯全部物种，强调沙地具有丰富的物种，最后又指出沙漠湖泊湿地是沙 漠区宝贵的生物资源宝库。横线前后均围绕沙地的生物多样性展开论述，要想承接上下文， 横线处也应该话题一致，围绕沙地的生物多样性展开论述，对应 D 项。A 项，“生态价值” 主体范围扩大，后文主要围绕“生物多样性”论述，排除；B 项，“防风固沙屏障带”文段 并未提及，无中生有，排除；C 项，“必不可少的要素”表述不明确，并且缺少文段核心话 题“生物多样性”，排除。故正确答案为 D。", "sec": "行测"}, {"id": 28, "t": "单选题", "q": "医疗美容是指运用手术、药物、医疗器械以及其他具有创伤性或者侵入性的医学技术对人的容貌和人体各部位形态进行的修复和再塑。这个行业在迅速发展的同时，也出现了许多乱象。一些地方医疗美容机构制售假劣“水光针”“整形用注射填充物”等美容针剂、违规使用“热玛吉”“光治疗”等医疗美容设备，导致医美事故频发，甚至出现非法从业、虚假宣传、借“医美贷”实施诈骗等违法犯罪行为，给消费者身心带来巨大伤害。这段文学主要介绍的是（ ）。", "opts": ["A. 医美行业发展迅速", "B. 医美行业事故频发", "C. 医美行业虚假宣传", "D. 医美行业乱象丛生"], "a": "D", "e": "主旨概括题。文段首句下定义引出“医疗美容”这一话题，下文强调医疗美容存在 很多乱象，并通过尾句例子进行论证，对应 D 项。A 项，“发展迅速”与乱象无关，排除； B 项“事故频发”，和 C 项“虚假宣传”对应例子，排除；D 项，“乱象丛生”对应文段主 旨，当选。故正确答案为 D。", "sec": "行测"}, {"id": 29, "t": "单选题", "q": "经济活动的可持续性和相关金融资产的价值依赖于生物多样性和环境提供的生态系统服务。与气候变化类似，生物多样性丧失也是本世纪面临的最大危机之一。导致环境恶化和气候变化的罪魁祸首是大量不考虑环境影响、破坏生物多样性、只顾赚钱的投资项目活动。因此，______。填入划横线部分最恰当的一句是（ ）。", "opts": ["A. 在保护生物多样性方面金融业有着不可推卸的责任", "B. 人类将面临气候变化和生物多样性丧失的巨大危机", "C. 应逐步建立对金融机构管理的监管框架和稳定机制", "D. 导致环境恶化的根本原因是大量经济活动的可持续性"], "a": "A", "e": "语句衔接题。横线在段尾，且横线前出现“因此”表结果或结论，横线处应总结全 文，文段首句用“依赖于”强调生态环境对于经济活动及相关金融资产发展延续的重要性， 接着引出问题“生物多样性丧失也同气候变化一样成为当前最大危机之一”，之后阐述造成 当前问题的首要原因是“只顾赚钱的投资项目活动”，由此可见，横线处应体现金融投资或 经济活动对于保护生态及物种多样性的重要作用，对应 A 项。B 项，“人类将面临气候变化 和生物多样性丧失的巨大危机”，缺少主体“经济”，不符合文意，排除；C 项，“应逐步 建立对金融机构管理的监管框架和稳定机制”，无中生有，不符合文意，排除；D 项，“导 致环境恶化的根本原因是大量经济活动的可持续性”，表述有误，文段中有“不考虑环境影 响、破坏生物多样性、只顾赚钱”的前提，不符合文意，排除。故正确答案为 A。", "sec": "行测"}, {"id": 30, "t": "单选题", "q": "实践是人的思维方式得以形成的最切近的现实基础，人的思维方式是实践的要素、结构、过程、程序、规律的观念反映，是实践方式的内化与积淀。没有实践活动，也就没有思维方式或思维结构。而思维方式或思维结构一经形成，又成为人们进行认知活动、评价活动和实践活动的思维的框架、定势、模式、取向。实践方式作为由实践的各种要素、活动构成的实践逻辑，经过实践的无数次的重复，逐步扬弃了具体实践活动的个别性、特殊性与偶然性而具备了一般性、普遍性与必然性，人类实践也逐渐趋向稳定、成熟并形成了相对稳定的模式。与这段文字的意思相符的一项是（ ）。", "opts": ["A. 实践即是一种思维方式", "B. 思维即是一种实践方式", "C. 实践方式形成思维方式", "D. 思维方式形成实践方式"], "a": "C", "e": "细节查找题。将选项与原文一一对应。A 项，对应“实践是人的思维方式得以形成 的最切近的现实基础”，与文意不符，排除；B 项，对应“人的思维方式是实践的要素、结 构、过程、程序、规律的观念反映，是实践方式的内化与积淀”，与文意不符，排除；C 项，对应“实践活动，也就没有思维方式或思维结构”，“没有……没有……”句式出现等 同必要条件中“不……不……”结构，强调了“实践活动”之于“思维方式或思维结构”的 必要性，可知实践方式形成思维方式，与文意相符；D 项，对应“而思维方式或思维结构一 经形成，又成为人们进行认知活动、评价活动和实践活动的思维的框架、定势、模式、取向 。”与文意不符，排除。故正确答案为 C。", "sec": "行测"}, {"id": 31, "t": "单选题", "q": "从古到今，人类不断梦想着能够找到长生不老的“灵丹妙药”，但目前也未有合法批准的能够真正用于抵抗衰老的药物或疗法。以干细胞抗衰老疗法为例，由于具有自我更新和多向分化能力，干细胞在组织再生等领域具有良好的应用潜力，也被宣传为延缓衰老的有力武器。然而科研人员提醒，虽然干细胞疗法在动物实验中表现出一定的治疗效果，但对于人类而言，还需要等待临床试验结果。衰老是机体在整体水平上的系统性变化，不是单一组织的变化，而干细胞目前还无法同时针对所有组织细胞发挥治疗或起到延缓衰老的作用。这段文字意在强调（ ）。", "opts": ["A. 采用干细胞疗法抵抗衰老大有可为", "B. 从古到今人类为延缓衰老进行了各种尝试", "C. 当前干细胞的抗衰老研究仍处于实验探索阶段", "D. 干细胞治疗用于延缓衰老还有许多问题"], "a": "C", "e": "主旨概括题。文段首先通过转折“但”强调目前还未有能抵抗衰老的药物和疗法， 接着举了干细胞抗衰老疗法的例子并通过转折“然而”，强调干细胞疗法对于人类而言还需 要等待临床试验结果，最后通过解释衰老的概念。故转折后是重点，强调目前未有能够真正 用于抵抗衰老的药物和疗法，对应 C 项。A 项，“大有可为”，与文段语义相悖，无中生 有，排除；B 项，文段并非强调“各种尝试”，偏离重点，排除；D 项，“有许多问题”代 表已经用了，但是不好用，而文段是强调目前还未有能抵抗衰老的药物或疗法，排除。故正 确答案为 C。", "sec": "行测"}, {"id": 32, "t": "单选题", "q": "真诚永远都像镜子一样，当你真诚面对公众时，公众肯定会读到你的真诚，即便你存在错误和自己没有发现的过失，那可能是智力问题，或者是现有的行为模式和智力结构所无法避免的，公众会原谅。本句的主旨是（  ）。", "opts": ["A. 无论正确错误都应该真诚地面对公众", "B. 公众能读懂你的真诚", "C. 真诚面对公众，公众会原谅你的错误", "D. 真诚是镜子"], "a": "A", "e": "据提问知此题是中心理解题。从关联词“即便”可知材料的主题——作者对于真诚 的支持立场：我们应该真诚地面对公众，不论正确与错误。后面从反面来论证“真诚面对公 众”的重要性。因此，结合选项应该选择A。B项未把握重点；C项后半句改变了句子的重点， 没有反映材料主题；D项只是材料为了更好地论证作的一个比喻，没有反映本质问题。故正确 答案为A。", "sec": "行测"}, {"id": 33, "t": "单选题", "q": "承认男人与女人在公共生活上拥有不同特质和技能非常重要。长久以来，女人一直被认为需要像男性一样思考、行动，才能获得成功。然而，女性有别于男性的差异渐渐被视为力量的来源，而非需要克服的弱点。历史上首位美国女性众议院议长佩洛西便呼吁女性“做自己”，认为“唯一能发挥你的独有贡献的人就是你，你的真诚便是你的强项”。但这并不代表前方的路途没有障碍。一直以来，人们都以双重标准判断女性。研究显示，女人的成就总是被看轻，而容许她们犯错的空间也比较少。", "opts": ["A. 对女性力量的新认识及女性人才发展的障碍", "B. 对女性能力的评价仍然存在误区", "C. 男女的思维、行动差别正是女性的优点", "D. 女性应做回自己而不必按男性的模式工作"], "a": "A", "e": "文段开篇引出男人与女人拥有不同特质和技能的话题，接着通过转折关联词“然而 ”指出女性有别于男性的差异渐渐被视为是女性的优势，并以佩洛西为例进行解释说明，而 后通过转折关联词“但”引出重点，即女性发展仍存在障碍并进行具体阐述。故文段强调对 女性力量的认识虽有所改变但女性发展仍存在障碍，对应A项。B项，对应文段“长久以来， 女人一直被认为需要像男性一样思考、行动，才能获得成功”部分的内容，为转折之前，非 文段重点，排除；C项，对应文段“女性有别于男性的差异渐渐被视为力量的来源，而非需要 克服的弱点”部分的内容，为转折之前，非文段重点，排除；D项，“不必按男性的模式”文 段未提及，无中生有，排除。故正确答案为A。", "sec": "行测"}, {"id": 34, "t": "单选题", "q": "①已经投入应用的主要是针对健康人群开发的、精准性稍差一些的非植入式设备；②到目前为止，科学家们已经发明了多种获取脑电波的设备；③近些年来，科学家们则在开发用于特殊病人的植入式设备上花费了大量精力；④但基于安全性、伦理性等方面的考虑，一直没有在人类的临床上取得突破；⑤这类设备被称为脑机芯片或干脆简称为脑机接口，它能获得更加精准的脑电信息，也能将外界电信号更加精准地输入大脑；⑥然而随着人工智能相关技术和工程技术、材料技术的飞速发展，不少科学家又开始了这类尝试；将以上 6 个句子重新排列，语序正确的是（ ）。", "opts": ["A. ②④①③⑤⑥", "B. ②①③⑤④⑥", "C. ③②①⑥⑤④", "D. ③⑥④①②⑤"], "a": "B", "e": "语句排序题。观察选项，判断首句，首句有②③，②说发明多种获取脑电波的设 备，③说已经投入的是非植入式设备，按照宏微观原则，需先发明设备，再应用，②在③之 前，排除 C 项、D 项。找捆绑，⑥出现“这类尝试”由题干得知，④中出现指代对象“一直 没有在临床上取得突破”，故④⑥捆绑，排除 A 项。故正确答案为B。", "sec": "行测"}, {"id": 35, "t": "单选题", "q": "单选题35、兵符：信物（ ）", "opts": ["A. 七律：绝句B、汉字：偏旁", "C. 干戈：战争", "D. 寒露：节气D种信物，二者为种属关系。A 项：七律是律诗的一种，绝句和律诗均是格律诗的一种，七律和绝句无明显逻辑关系，与题干逻辑关系不一致，排除；B 项：偏旁是组成汉字的一部分，二者为组成关系，与题干逻辑关系不一致，排除；C 项：干为防具，戈为武器，二者均为古代兵器，因此后以“干戈”用作兵器的通称，后来引申为指战争，干戈和战争为比喻象征义，与题干逻辑关系不一致，排除；D 项：寒露，是二十四节气之第十七个节气，秋季的第五个节气，寒露是一种节气，二者为种属关系，与题干逻辑关系一致，当选。故正确答案为D。"], "a": "", "e": "并列关系。题干逻辑关系：兵符是古代帝王授予兵权和调发军队的信物，兵符是一", "sec": "行测"}, {"id": 36, "t": "单选题", "q": "单选题36、伸延：延伸（ ）", "opts": ["A. 登攀：攀登B、喜欢：欢喜", "C. 生产：产生", "D. 等次：次等A长伸展，二者为近义关系。A 项：登攀，指攀援登高，也指进取；攀登，指的是抓住东西向上爬，也比喻不畏艰险,积极进取，二者为近义关系，与题干逻辑关系一致，保留；B 项：喜欢，指的是对人或事物有好感或感兴趣；欢喜，指快乐、高兴，也指喜欢、喜爱，二者是近义关系，与题干逻辑关系一致，保留；C 项：生产，指的是人们通过工具来创造各种生活和生产资料；产生，指的是由已有的事物中派生出新的事物，二者不是近义关系，与题干逻辑关系不一致，排除；D 项：等次，指的是等级高下次序；次等，指的是第二等的，低于或次于最好的，二者不是近义关系，与题干逻辑关系不一致，排除。比较 A、B 两项，题干和 A选项的词汇都只是动词，而 B 选项的欢喜既可以做动词也可以做形容词，故 A 项与题干逻辑关系更一致。故正确答案为 A。"], "a": "", "e": "语义关系，近义关系。题干逻辑关系：伸延，指的是伸展、延伸；延伸，指的是延", "sec": "行测"}, {"id": 37, "t": "单选题", "q": "单选题37、牡丹花：牵牛花（ ）", "opts": ["A. 金枪鱼：八爪鱼", "B. 东北菜：黄花菜", "C. 布谷鸟：啄木鸟", "D. 变色龙：霸王龙"], "a": "C", "e": "并列关系。题干逻辑关系：牡丹花和牵牛花是两种不同的花，二者为并列关系。A 项：金枪鱼是鱼类，而八爪鱼是软体动物，二者不是并列关系，与题干逻辑关系不一致，排 除；B 项：东北菜是东北地区的本土菜系，黄花菜是一种可以食用的植物，二者不是并列关 系，与题干逻辑关系不一致，排除；C 项：布谷鸟和啄木鸟是两种不同的鸟，二者为并列关 系，与题干逻辑关系一致，当选；D 项：变色龙是一种爬行动物，霸王龙是一种恐龙，而变 色龙不是恐龙，二者不是并列关系，与题干逻辑关系不一致，排除。故正确答案为 C。", "sec": "行测"}, {"id": 38, "t": "单选题", "q": "单选题38、虫害：植物受损（ ）", "opts": ["A. 雾霾：慢性肺炎", "B. 除名：查无此人", "C. 赤潮：海水污染", "D. 失眠：辗转反侧"], "a": "A", "e": "因果关系。题干逻辑关系：虫害导致植物受损，二者为因果关系，且虫害和植物受 损均是不好的。A 项：雾霾导致慢性肺炎，二者为因果关系，且雾霾和慢性肺炎均是不好 的，与题干逻辑关系一致，当选；B 项：除名是使退出集体，从名册中除掉姓名，除名导致 查无此人，二者构成因果关系，但结果不一定是不好的，与题干逻辑关系不一致，排除；C 项：海水污染导致赤潮，二者为因果关系，但是顺序与题干相反，与题干逻辑关系不一致， 排除；D 项：辗转反侧是失眠的一种表现特征，二者不是因果关系，与题干逻辑关系不一 致，排除。故正确答案为 A。", "sec": "行测"}, {"id": 39, "t": "单选题", "q": "单选题39、网箱养殖：深海养殖（ ）", "opts": ["A. 网络设备：无线网卡", "B. 成人教育：职业教育", "C. 载人飞船：返回舱", "D. 娱乐项目：剧本杀"], "a": "B", "e": "交叉关系。题干逻辑关系：有的网箱养殖是深海养殖，有的网箱养殖不是深海养 殖，有的深海养殖是网箱养殖，有的深海养殖不是网箱养殖，二者为交叉关系。A 项：无线 网卡是一种网络设备，二者为种属关系，与题干逻辑关系不一致，排除；B 项：有的成人教 育是职业教育，有的成人教育不是职业教育，有的职业教育是成人教育，有的职业教育不是 成人教育，二者为交叉关系，与题干逻辑关系一致，当选；C 项：返回舱是载人飞船的一部 分，二者为组成关系，与题干逻辑关系不一致，排除；D 项：剧本杀是一种娱乐项目，二者 为种属关系，与题干逻辑关系不一致，排除。故正确答案为 B。", "sec": "行测"}, {"id": 40, "t": "单选题", "q": "单选题40、锁骨：肋骨：坐骨（ ）", "opts": ["A. 头脑：头皮：头发", "B. 腹腔：口腔：鼻腔", "C. 盲肠：大肠：直肠", "D. 颈椎：胸椎：腰椎"], "a": "D", "e": "并列关系。题干逻辑关系：锁骨、肋骨和坐骨都是人体的骨骼，三者是并列关系， 且三者在人体中位置是从上到下排列。A 项，头脑人的脑子，头皮是覆盖于颅骨之外的软组 织，头发生于头部的毛发，三者无明显关系，与题干逻辑关系不一致，排除；B 项，腹腔、 口腔和鼻腔都是人体器官，三者为并列关系，但三者是由下向上排列，与题干逻辑关系不一 致，排除；C 项，盲肠是人体的器官，大肠是人体消化系统的重要组成部分，直肠是肠管的 最末的一段，三者无明显关系，与题干逻辑关系不一致，排除。D 项，颈椎、胸椎和腰椎都 是脊椎所含骨骼，三者是并列关系，且三者在人体中位置是从上到下排列与题干逻辑关系一 致，当选；故正确答案为 D。", "sec": "行测"}, {"id": 41, "t": "单选题", "q": "单选题41、热传递：热传导：热辐射（ ）", "opts": ["A. 隔离：冷却：灭火", "B. 混合物：化合物：纯净物", "C. 播种：撒播：条播", "D. 说明文：举例子：作比较"], "a": "C", "e": "并列关系+种属关系。热传导和热辐射并列关系，热传导和热辐射都是 热传递的方 式，热传导、热辐射和热传递都是种属关系。A 项，隔离和冷却是并列关系，隔离和冷却都 是灭火的方式，隔离、冷却和灭火都是种属关系，题干逻辑关系一致，但顺序不同，排除；B 项，说明文是一种文体，举例子是一种说明方式，作比较是说明方式，举例子、作比较都是 说明方式，与说明文不是种属关系，与题干逻辑关系不一致，排除；C 项，撒播和条播是并 列关系，撒播和条播都是播种方式，撒播、条播都和播种都是种属关系，与题干逻辑关系一 致，当选；D 项，混合物是指由两种或多种物质混合而成的物质，化合物是指由两种或两种 以上不同元素组成的纯净物，纯净物是指由一种单质或一种化合物组成的聚合物。混合物与 纯净物为并列关系，化合物与纯净物为种属关系，与题干逻辑关系不一致，排除。故正确答 案为 C。", "sec": "行测"}, {"id": 42, "t": "单选题", "q": "单选题42、服装：唐装：西装（ ）", "opts": ["A. 刷牙：牙刷：牙膏", "B. 豪车：赛车：轿车", "C. 旗帜：国旗：红旗", "D. 武术：太极拳：咏春拳"], "a": "D", "e": "种属关系+并列关系。唐装是服装的一种，二者属于种属关系；西装是服装的一种， 二者是种属关系；唐装和西装是并列关系。唐装和西装是两种不同的服装，后两词为并列关 系，且均与第一词构成种属关系。第二步：判断选项词语间逻辑关系。A 项，牙刷和牙膏是 刷牙时配套使用的工具，与刷牙不构成种属关系，与题干逻辑关系不一致，排除；B 项，豪 车、赛车和轿车时从不同的划分角度命名的汽车，三者是交叉关系，与题干逻辑关系不一 致，排除；C 项，国旗是旗帜中的一种，二者属于种属关系；红旗是旗帜的一种，二者属于 种属关系；有的国旗是红旗，有的红旗是国旗，二者是交叉关系，与题干逻辑关系不一致， 排除；D 项，太极拳是一门中国传统武术，二者属于种属关系；咏春拳是一门中国传统武 术，二者是种属关系；太极拳和咏春拳是并列关系，与题干逻辑关系一致，当选。故正确答 案为 D。", "sec": "行测"}, {"id": 43, "t": "单选题", "q": "单选题43、数字经济对于 （ ）相当于（ ）对于 人工智能", "opts": ["A. 信息工具；家用电器", "B. 信息技术；无人驾驶", "C. 数字资源；现代农业", "D. 数字货币；远程医疗"], "a": "B", "e": "对应关系。代入选项分析。A 项，“信息工具”是指用于处理、存储、传输和展示 信息的各种工具和技术，发展“数字经济”需要用到“信息工具”，二者属于工具对应关 系；“家用电器”与“人工智能”为交叉关系。前后逻辑关系不一致，排除；B 项，““信 息技术”是发展““数字经济”的必要条件，““人工智能”是发展““无人驾驶”的必要 条件。前后逻辑关系一致，当选；C 项，““数字资源”是文献信息的表现形式之一，是将 计算机技术、通信技术及多媒体技术相互融合而形成的以数字形式发布、存取、利用的信息 资源总和。发展“数字经济”离不开“数字资源”，二者为条件关系；“现代农业”是在现 代工业和现代科学技术基础上发展起来的农业，““人工智能”可以为发展现代农业提供助 力，二者属于对应关系。前后逻辑关系不一致，排除；D 项，““数字货币”是电子货币形 式的替代货币。““数字货币”是““数字经济”里的一种产物，二者属于对应关系；“远 程医疗”是指通过计算机技术、遥感、遥测、遥控技术为依托，充分发挥大医院或专科医疗 中心的医疗技术和医疗设备优势，对医疗条件较差的边远地区、海岛或舰船上的伤病员进行 远距离诊断、治疗和咨询，与“人工智能”无明显逻辑关系。前后逻辑关系不一致，排除。 故正确答案为 B。", "sec": "行测"}, {"id": 44, "t": "单选题", "q": "单选题44、缘木求鱼 对于（ ）相当于（ ）对于 抱薪救火", "opts": ["A. 事与愿违；抽薪止沸", "B. 南辕北辙；通宵达旦", "C. 刻舟求剑；纵风止燎", "D. 凿壁偷光；扬汤止沸"], "a": "C", "e": "近义关系+方式目的关系。A 项，事与愿违是事情的发展与愿望相反，指事情没能按 照预想的方向发展，缘木求鱼无明显关系，抽薪止沸比喻从根本上解决问题，与抱薪救火反 义关系，前后逻辑关系不一致，排除。B 项，南辕北辙比喻行动和目的正好相反，与缘木求 鱼无明显关系，通宵达旦指整整一夜，从天黑到天亮，与抱薪救火无明显关系，前后逻辑关 系不一致，排除；C 项，缘木求鱼与刻舟求剑近义关系，均指行事的方向、方法不对，必将 劳而无功，近义关系；纵风止燎与抱薪救火均指以错误的方法消除灾祸，结果反而使灾祸扩 大，近义关系，前后关系一致，当选；D 项，缘木求鱼比喻行事的方向、方法不对，必将劳 而无功，凿壁偷光形容家贫而读书刻苦学习的事情，无明显关系；扬汤止沸比喻办法不彻 底，不能从根本上解决问题，抱薪救火指抱着柴火救火，比喻以错误的方法消除灾祸，结果 反而使灾祸扩大，近义关系，前后逻辑关系不一致，排除；故正确答案为C。", "sec": "行测"}, {"id": 45, "t": "单选题", "q": "《中华人民共和国法律援助法》对于规范和促进法律援助工作、保障公民和有关当事人合法权益具有重大意义。下列情况属于可经指派获得法律援助的是（ ）①15 岁的学生小明涉嫌贩卖毒品，没有委托辩护人；②25 岁的精神病人赵某涉嫌抢劫，其患病多年经济困难，没有委托辩护人；③35岁的村民张某因向村中水井投毒，可能被判处死刑，没有委托辩护人；④45 岁的聋哑人李某创设公司后涉嫌逃税罪，其个人资产过亿，没有委托辩护人", "opts": ["A. ①②③", "B. ②③④", "C. ①③④", "D. ①②③④"], "a": "D", "e": "本题考查法律常识。根据《中华人民共和国法律援助法》第二十五条第一款规定， 刑事案件的犯罪嫌疑人、被告人属于下列人员之一，没有委托辩护人的，人民法院、人民检 察院、公安机关应当通知法律援助机构指派律师担任辩护人：（一）未成年人；（二）视力 、听力、言语残疾人；（三）不能完全辨认自己行为的成年人；（四）可能被判处无期徒刑 、死刑的人；（五）申请法律援助的死刑复核案件被告人；（六）缺席审判案件的被告人； （七）法律法规规定的其他人员。所以，符合法律规定的为①②③④。故正确答案为 D。", "sec": "行测"}, {"id": 46, "t": "单选题", "q": "根据中共中央、国务院 2023 年 3 月印发的《党和国家机构改革方案》，下列关于本次改革方案的表述错误的是（）。", "opts": ["A. 证券业之外的金融业监管由国家金融监督管理总局统一负责", "B. 统筹数字资源整合共享和开发利用，是国家数据局的职责之一", "C. 在农业农村部加挂国家乡村振兴局牌子，不再保留单设的国家乡村振兴局", "D. 将工业和信息化部的国家高新技术产业开发区等科技园区建设职责划入科学技术部"], "a": "D", "e": "本题考查政治常识。《党和国家机构改革方案》指出“（七）重新组建科学技术 部......将科学技术部的组织拟订高新技术发展及产业化规划和政策，指导国家自主创新示 范区、国家高新技术产业开发区等科技园区建设，指导科技服务业、技术市场、科技中介组 织发展等职责划入工业和信息化部......”，选项与原文表述不一致。故正确答案为 D。", "sec": "行测"}, {"id": 47, "t": "单选题", "q": "单选题47、戏曲是中华优秀传统文化的重要组成部分，下列有关说法错误的是（ ）。", "opts": ["A. 京剧、豫剧、评剧、黄梅戏、越剧是中国戏剧五大剧种", "B. 《群英会》是依据《水浒传》改编的传统京剧", "C. 黄梅戏代表剧目中有《天仙配》和《女驸马》", "D. 豫剧与梆子腔关系紧密"], "a": "B", "e": "本题考查人文常识。《群英会》是依据《三国演义》第 45 回改编的传统京剧，故 事叙述：曹操谋士蒋干，与周瑜故交，请求过江劝降。周瑜将计就计，盛会隆重宴请诸将和 挚友，号称“群英会”。故正确答案为 B。", "sec": "行测"}, {"id": 48, "t": "单选题", "q": "小明被困在一个无人、无食物来源但有淡水的荒岛上。假如他在等待救援期间可以从相同重量的葡萄、馒头、酸奶、花生仁这四种食物中选择一种，那么为了能在岛上生存的时间最长，他应该选择的食物是（ ）。", "opts": ["A. 葡萄", "B. 馒头", "C. 酸奶", "D. 花生仁"], "a": "D", "e": "本题考查科技常识。葡萄的主要成分是水分和糖类，每 100 克葡萄的热量约为 45 千卡。每 100 克葡萄中水分占到 81 克，碳水化合物为 15.7 克左右，蛋白质为 0.7 克， 脂肪为 0.6 克；馒头的主要成分是糖类，每 100 克馒头的热量约为 230 千卡。每 100 克 馒头中碳水化合物的含量为 47 克，蛋白质为 7 克，脂肪为 1.1 克；酸奶是牛奶经过乳酸 菌发酵而成，主要含有蛋白质、脂肪、乳酸菌、钙以及多种维生素，每 100 克酸奶的热量约 为 70 千卡。每 100 克酸奶中的蛋白质含量为 4.3 克左右，脂肪为 2.9 克左右；D 项，花 生仁的主要成分是脂肪、蛋白质、碳水化合物，每 100 克花生仁的热量约为 560 千卡。每 100 克花生中蛋白质的含量为 24.8 克左右，脂肪为 44.3 克左右，碳水化合物为 21.7克左 右。相同重量的花生所含能量最多，因此为了能在岛上生存的时间最长应该选择花生仁。故 正确答案为 D。", "sec": "行测"}, {"id": 49, "t": "单选题", "q": "单选题49、下列病毒与其主要感染的人体系统对应正确的是（ ）。", "opts": ["A. 狂犬病毒——免疫系统", "B. 流感病毒——神经系统", "C. 乙肝病毒——消化系统", "D. 艾滋病毒——生殖系统"], "a": "C", "e": "本题考查科技常识。A 项，狂犬病毒主要感染神经系统。人类被携带狂犬病毒的动 物咬伤后，狂犬病毒会从伤口处进入人体，但并不会马上侵染神经元，而是在肌肉内停留一 段时间，这就是潜伏期。潜伏期之后，狂犬病毒会经过运动神经和骨骼肌之间的连接，进入 神经系统，一旦狂犬病毒开始侵染神经系统，便会在神经元之间高速运输，神经系统会受到 致命的破坏。狂犬病毒主要是通过动物咬抓伤传播。故 A 项说法错误；B 项，流感病毒是一 种影响上呼吸道和下呼吸道的传染性病毒性疾病，主要感染呼吸系统，通过空气飞沫传播。 故 B 项说法错误；C 项正确，乙肝病毒主要感染消化系统。乙肝病毒主要感染身体中的肝脏 部位，可能会造成肝功能损伤，肝脏属于消化系统。乙肝的传播方式主要是血液传播、性传 播和母婴传播。故 C 项说法正确；D 项错误，艾滋病毒主要感染免疫系统。艾滋病毒会攻击 并逐渐破坏人类的免疫系统，致使宿主在被感染时得不到保护。艾滋病毒主要是血液传播、 性传播和母婴传播。故正确答案为 C。", "sec": "行测"}, {"id": 50, "t": "单选题", "q": "单选题50、下列古代汲水灌溉工具与应用原理对应错误的是（  ）。", "opts": ["A. 桔槔——杠杆原理", "B. 辘轳——轮轴原理", "C. 翻车——对称守恒原理", "D. 筒车——叶轮原理"], "a": "C", "e": "A项正确：桔槔始见于《墨子·备城门》，作“颉皋”。是一种利用杠杆原理的取水 机械。B项正确：辘轳，汉族民间提水设施，流行于北方地区。由辘轳头、支架、井绳、水斗 等部分构成。利用轮轴原理制成的井上汲水的起重装置。C项错误：中国古代链传动的最早应 用就是在翻车上，是农业灌溉机械的一项重大改进。翻车并没有应用对称守恒原理，此原理 经常用在协同反应中描述分子轨道。D项正确：筒车是和翻车相类似的提水机具。这是利用湍 急的水流转动车轮，使装在车轮上的水筒，自动戽水，提上岸来进行灌溉。本题为选非题， 故正确答案为C。", "sec": "行测"}, {"id": 51, "t": "单选题", "q": "单选题51、唐代是丝绸之路的鼎盛时期，当时丝绸之路上的商队可能携带的商品是（ ）。", "opts": ["A. 线装本的《史记》", "B. 精心制作的宣德炉", "C. 《司马温公神道碑》拓片", "D. 鎏金工艺制作的莲瓣银茶托"], "a": "D", "e": "本题考查人文常识。A 项，线装书是指以线类进行装订的图书类型。中国古代的纸 本书，经历了卷轴和册页两个阶段。宋代是书籍印刷爆发的时代，开始出现多种多样的装订 方法，宋代是书籍装订形式最重要的一个时期，线装书产成于宋代。唐代丝绸之路上的商队 不可能携带线装本的《史记》；B 项，宣德炉是由明宣宗朱瞻基在大明宣德三年参与设计监 造的铜香炉，简称“宣炉”；C 项，《司马温公神道碑》是宋代苏轼奉宋哲宗之命为司马光 （追赠太师、温国公，谥号文正）撰写的碑文，碑文充满了苏轼对司马光的尊敬怀念之情；D 项，鎏金是一种金属加工工艺，始于战国。1957 年陕西省西安市唐长安城平康坊遗址出土了 唐朝鎏金莲瓣银茶托。唐代丝绸之路上的商队有可能携带鎏金工艺制作的莲瓣银茶托。故正 确答案为 D。", "sec": "行测"}, {"id": 52, "t": "单选题", "q": "《礼记·曲礼》有言：“男子二十冠而字。”古人名与字的含义通常有一定关联，或相同相近，或相关相辅，或相反相成，下列历史人物名与字的对应关系与其他三项不同的是（ ）。", "opts": ["A. 曹丕，字子桓", "B. 周瑜，字公瑾", "C. 杜甫，字子美", "D. 朱熹，字元晦"], "a": "D", "e": "本题考查人文常识。A 项，“丕”字在《说文解字》里意为“大”，“桓”的意思 取大，与“丕”的意思一致。名和字意义相同。B 项，“瑜”和“瑾”均出自《楚辞·九章 ·怀沙》，原文为“怀瑾握瑜兮，穷不知所示。”故“瑜”和“瑾”均意指美玉。名和字意 义相同。C 项，“甫”是古代美男子的称呼；“美”是男人长得好看的意思。名和字意义相 同。D 项，“熹”为明亮之意，而“晦”则是昏暗的意思。名与字意义相反。故正确答案为 D。", "sec": "行测"}, {"id": 53, "t": "单选题", "q": "单选题53、讲述宋史时，“燕云十六州”是绕不开的话题，下列有关叙述不正确的是（ ）。", "opts": ["A. 周世宗柴荣北伐时收复了部分州", "B. 澶渊之盟正式将燕云十六州割让给辽国", "C. 高梁河之战使北宋失去了完全收复燕云十六州的时机", "D. 燕云十六州是我国北方以幽州和云州为中心的十六个州"], "a": "B", "e": "本题考查人文常识。五代十国时期，后晋开国皇帝石敬瑭即位后，割幽、蓟、瀛、 莫、涿、檀、顺、新、妫、儒、武、云、应、寰、朔、蔚十六州以与契丹，仍许岁输帛三十 万匹。此举正式将燕云十六州割让给辽国。公元 1005 年，宋辽在澶州签订合约，合约规 定，辽宋约为兄弟之国，宋每年送给辽岁币银 10 万两、绢 20 万匹，宋辽以白沟河为边界 。因澶州（河南濮阳）在宋朝亦称澶渊郡，故史称“澶渊之盟”。故正确答案为 B。", "sec": "行测"}, {"id": 54, "t": "单选题", "q": "单选题54、下列关于贷款市场报价利率（LPR）说法错误的是（ ）。", "opts": ["A. 目前 LPR只有 1 年期和5 年期以上两个期限品种", "B. 当 LPR下降后，商业性个人住房贷款的最新一期月供也会下降", "C. LPR 是由中国人民银行授权全国银行间同业拆借中心计算并公布的基础性的贷款参考利率", "D. 新发放的商业性个人住房贷款利率是以最近一个月相应期限的贷款市场报价利率为定价基准加点形成"], "a": "B", "e": "本题考查经济常识。LPR 下降房贷月供不一定会下降。如果贷款人选择的是固定利 率，房贷月供不受 LPR 调整的影响。如果贷款人选择的是浮动利率，当 LPR 下降，也不会 马上对房贷月供产生影响，而是要等到下一个重定价日，再根据当时最近一个月的LPR 进行 重新定价。房贷利率重定价日一般是次年的 1 月 1 日。故正确答案为 B。", "sec": "行测"}, {"id": 55, "t": "单选题", "q": "单选题55、下列关于国债逆回购的说法正确的是（ ）。", "opts": ["A. 投资者可以通过银行网点购买国债逆回购", "B. 国债逆回购是以国家为主体进行债券回购", "C. 国债逆回购本质上是一种短期资金借贷方式", "D. 国债逆回购利率上行 20 个基点表示利率增加 2%"], "a": "C", "e": "本题考查经济常识。A 项，投资者应选择有国债逆回购业务的证券营业部开户。此 外，证券交易所还会和投资者签一个“指定交易协议”，所以投资者应在证券交易所开户进 行交易。但不可以通过银行网点进行购买；B 项，国债逆回购参与主体大致分为两类：第一 类为融资方，一般是商业银行、非银行金融机构等，第二类为资金出借方，一般有个人投资 者、基金公司、保险公司等。所以国债逆回购并不是以国家为主体进行债券回购；C 项，国 债逆回购本质就是一种短期贷款，即将资金通过国债回购市场拆出，其实就是一种短期贷款 。个人通过国债回购市场把自己的资金借出去，获得固定的利息收益；而回购方，也就是借 款人用自己的国债作为抵押获得这笔借款，到期后还本付息；D 项，基点是利率的计数单 位，一个百分点等于 100 个基点，也叫 BP。如原来利率是3.25%，下降 25 个基点，就成了 3%。此处上行 20 个基点表示利率增加 0.2%。故正确答案为 C。", "sec": "行测"}, {"id": 56, "t": "单选题", "q": "宝石是用于装饰的、有经济价值的矿物及生物矿物和岩石的总称，呈现晶体、集合体等形态，是地球送给人类的珍贵礼物。下列不属于宝石形成机制的是（ ）。", "opts": ["A. 由炽热岩浆喷发所生成的熔岩蒸汽冷凝产生", "B. 岩浆冷却凝固时浓缩的成分结晶后形成", "C. 在地核内部高温高压变质瘤结成型", "D. 从岩浆产生的热液中结晶生长"], "a": "C", "e": "本题考查地理常识。A、B 正确，按岩石性质，宝石可分三类：火成岩（岩浆岩）、 变质岩与沉积岩。岩浆岩又称火成岩，是由炽热岩浆喷出地表或侵入地壳冷却凝固所形成的 岩石。岩浆在冷却过程中，由于温度和压力的变化，会形成不同类型的火成岩，包括侵入岩 和喷出岩。火成岩中的宝石，如钻石和蓝宝石，通常是在岩浆上升到地表的过程中，由于冷 却速度的不同而形成的。变质岩是由火成岩或沉积岩在高温高压下经历化学和物理变化而形 成。沉积岩，又称为水成岩，是由地表或接近地表的水溶液结晶而成的，这些水溶液可能含 有特定的矿物质，如二氧化碳和二氧化硅。沉积岩通常成层堆叠，如石灰岩和页岩，它们可 以形成各种宝石，如蛋白石和绿松石；C 项，宝石分布在地壳和地幔中，不是在地核内部高 温高压变质瘤结成型；D 项，当水热与地球内部岩浆相互作用时，形成热液。从岩浆产生的 热液中可以形成结晶，当岩浆冷却时，如果有合适的温度、压力、空间和足够时间就可以形 成宝石，包括紫水晶、黄晶以及祖母绿等。故正确答案为 C。", "sec": "行测"}, {"id": 57, "t": "单选题", "q": "酶是具有高度特异性和高度催化效能的生物催化剂，在人类的生产生活中具有重要的应用。以下有关酶的添加应用对应错误的是（ ）。", "opts": ["A. 白酒——淀粉酶", "B. 果汁——纤维素酶", "C. 脱脂奶——乳糖酶", "D. 加酶洗衣粉——蛋白酶"], "a": "C", "e": "本题考查科技常识。A 项，在白酒酿酒过程中，以淀粉为原料酿酒，需经过两个主 要过程，一是淀粉糖化过程；二是酒精发酵过程。淀粉吸水膨胀，加热糊化，形成结构疏松 的淀粉，在淀粉酶的作用下分解为低分子的单糖；单糖在脱羧酶、脱氢酶的催化下分解，逐 渐分解形成二氧化碳和酒精；B 项，纤维素酶是一类能够降解纤维素的酶，其主要作用是水 解果汁中的纤维素成分，使其分解成可溶性物质。水果中含有纤维素、果胶等大分子物质， 在榨汁时，这些物质会影响出汁率并使榨出的果汁浑浊，易出现沉淀。添加纤维素酶、果胶 酶可以将果胶、纤维素分解成小分子的可溶性的物质，从而提高出汁率并使果汁饮料澄清；C 项，错误，乳糖酶是人体中的一种消化酶，是以母乳、奶粉为主要营养来源的婴幼儿体内最 重要的消化酶，乳糖酶的主要功能是消化乳糖，将乳糖水解成能够被人体吸收的半乳糖和葡 萄糖。乳糖酶主要用于乳品工业，可使低甜度和低溶解度的乳糖转变为较甜的、溶解度较大 的单糖，还可使冰淇淋、浓缩乳、淡炼乳中乳糖结晶析出的可能性降低，同时增加甜度。脱 脂奶主要通过离心分离将牛奶中的脂肪和非脂肪部分分离而获得。二者并无直接关联；D 项，加酶洗衣粉中添加了多种酶制剂，碱性蛋白酶是目前市场上流行的洗涤添加剂，能大幅 度提高洗涤去污能力，特别对血渍、汗渍、奶渍、油渍等蛋白类污垢，具有独特的洗涤效果 。故正确答案为 C。", "sec": "行测"}, {"id": 58, "t": "单选题", "q": "为了避讳，古代君王的名字在说话或行文中不能直接说出或写出，而以改字、缺字等办法处理。下列说法不符合这一避讳原则的是（ ）。", "opts": ["A. 秦代将金陵这一地名改为秣陵", "B. 汉代将彻侯这一爵位更名为通侯", "C. 唐代佛经中将“观世音菩萨”译为“观音菩萨”", "D. 清代将《千字文》首句“天地玄黄”改为“天地元黄”"], "a": "A", "e": "本题考查人文常识。A 项，秣陵是秦代的南京名称，秦始皇三十七年（前 210） 置，属会稽郡。公元前 210 年，秦始皇东巡，曾在秣陵关西南丹阳（今江宁区丹阳）经过， 回途又从江乘渡江北返。随行术士认为金陵山势险峻，有天子之气，秦始皇便把王气泄散， 将金陵改为秣陵。“秣”是草料的意思，意即这里不该称金陵，只能贬为牧马场。故金陵改 为秣陵并不是为了避讳；B 项，西汉第七位皇帝为汉武帝刘彻，因此将“彻侯”更名为“通 侯”是为了避其名讳；C 项，唐代第二位皇帝为唐太宗李世民，因此唐代佛经中将观世音菩 萨改为“观音菩萨”是为了避其名讳；D 项，清朝第四位皇帝为清圣祖爱新觉罗·玄烨，因 此清朝时将“天地玄黄”改“天地元黄”是为了避其名讳。故正确答案为 A。", "sec": "行测"}, {"id": 59, "t": "单选题", "q": "单选题59、中国书法艺术是中华民族的文化瑰宝，下列说法正确的是（ ）。", "opts": ["A. 王献之书写的《兰亭集序》被誉为“天下第一行书”", "B. 《九成宫醴泉铭》是由魏征撰文、柳宗元书丹而成", "C. 黄庭坚是南宋著名书法家，擅长行书和草书", "D. 《颜氏家庙碑》由颜真卿为其父颜惟贞所立"], "a": "D", "e": "本题考查人文常识。A 项，“天下第一行书”《兰亭集序》的作者为东晋书法家王 羲之，王献之为王羲之之子；B 项，《九成宫醴泉铭》是唐贞观六年（632）由魏征撰文、书 法家欧阳询书丹而成的楷书书法作品。被后世誉为“天下第一楷书”或“天下第一正书”；C 项，黄庭坚是北宋著名文学家、书法家、江西诗派开山之祖。他还是著名的北宋大孝子，《 二十四孝》中“涤亲溺器”故事的主角。黄庭坚书法造诣很高，为“宋四家”之一，擅长行 书、草书，楷书也自成一家；D 项，《颜氏家庙碑》全称《唐故通议大夫行薛王友柱国赠秘 书少监国子祭酒太子少保颜君碑铭》，是唐建中元年（780 年）颜真卿为其父颜惟贞刻立， 碑文记述了颜氏家族及其仕宦经历、后裔仕途、治学经世的情况。故正确答案为 D。", "sec": "行测"}, {"id": 60, "t": "单选题", "q": "单选题60、下列诗句内容与传统节日对应错误的是（ ）。", "opts": ["A. “金吾不禁夜，玉漏莫相催”——寒食节", "B. “彩缕碧筠粽，香粳白玉团”——端午节", "C. “此生此夜不长好，明月明年何处看”——中秋节", "D. “桂花香馅裹胡桃，江米如珠井水淘”——元宵节"], "a": "A", "e": "本题考查人文常识。A 项，“金吾不禁夜，玉漏莫相催”出自唐代文学家苏味道的 《正月十五夜》，描写的长安城元宵之夜的景色。诗句意思为，京城取消了夜禁，计时的玉 漏你也不要着忙，莫让这一年只有一次的元宵之夜匆匆过去。元宵节会有猜灯谜等活动，所 以会开放夜禁；寒食节，是在夏历冬至后的 105 日，清明节前一二日，主要有禁烟火，只吃 冷食，祭扫、踏青、秋千、蹴鞠、牵勾、斗鸡等习俗；B 项，“彩缕碧筠粽，香粳白玉团” 出自唐代元稹的《表夏十首》，诗句中彩缕指的是绑粽子的带子；碧筠粽表示的是包粽子的 箬叶的颜色为深绿色，即为深绿色的粽子。香粳白玉团指的是拨开粽叶后的粽子像玉石一样 白。吃粽子是端午节的习俗；C 项，“此生此夜不长好，明月明年何处看”出自宋代文学家 苏轼的《阳关曲·中秋月》，诗句意思为，我这一生中每逢中秋之夜，月光多为风云所掩， 很少碰到像今天这样的美景，真是难得啊！可明年的中秋，我又会到何处观赏月亮呢？诗句 表达了苏轼对漂泊的无奈和分离的不舍；D 项，“桂花香馅裹胡桃，江米如珠井水淘”出自 清代符曾的《上元柱枝词》，说的是上元节做元宵买元宵的风俗。诗句的意思是香甜的桂花 馅料里裹着核桃仁，用井水来淘洗像珍珠一样的江米，说的是元宵。故正确答案为 A。", "sec": "行测"}, {"id": 61, "t": "单选题", "q": "单选题61、下列关于先秦诸子百家叙述不正确的是（ ）。", "opts": ["A. 孙武是兵家思想代表人物", "B. 老子提出了“内圣外王”的治国思想", "C. 韩非子是法家的代表人物，是荀子的学生", "D. 墨家学派有严密的组织、严格的纪律，其创始人为墨翟"], "a": "B", "e": "本题考查人文常识。B 项，“内圣外王”出自《庄子》：“是故内圣外王之道，暗 而不明，郁而不发，天下之人，各为其所欲焉，以自为方”但却是儒家的基本命题。通俗的 讲，内备圣人之至德，施之于外，则为王者之政。故正确答案为 B。", "sec": "行测"}, {"id": 62, "t": "单选题", "q": "探索建立长期护理保险制度，是党和政府为应对人口老龄化、健全社会保障体系作出的一项重要部署。下列关于我国长期护理保险制度的说法正确的是（ ）。", "opts": ["A. 长期护理保险属于养老保险范畴", "B. 长期护理保险的参保对象是已退休的老年人", "C. 根据护理等级、服务提供方式等不同实行差别化待遇保障政策", "D. 因突发疾病住院产生的护理费用属于长期护理保险的支付范围"], "a": "C", "e": "本题考查政治常识。A 项错误，根据国家医保局、财政部《关于扩大长期护理保险 制度试点的指导意见》（以下简称《意见》）长期护理保险被称为“第六险”，重点解决重 度失能人员长期护理保障问题，不属于传统五险（养老保险、医疗保险、工伤保险，失业保 险，生育保险）的范畴；B 项错误，《意见》指出试点阶段的长期护理保险的参保对象，从 职工基本医疗保险参保人群起步，重点解决重度失能人员基本护理保障需求，优先保障符合 条件的失能老年人、重度残疾人。有条件的地方可随试点探索深入，综合考虑经济发展水平 、资金筹集能力和保障需要等因素，逐步扩大参保对象范围，调整保障范围；C 项正确，《 意见》指出长期护理保险基金主要用于支付符合规定的机构和人员提供基本护理服务所发生 的费用。根据护理等级、服务提供方式等不同实行差别化待遇保障政策，鼓励使用居家和社 区护理服务；D 项错误，《意见》指出长期护理险针对年老、疾病或伤残导致生活不能自 理，需要在家中或疗养院治病医疗由专人陪护所产生的费用进行支付的保险。不包括疾病住 院产生的护理费，参保人员住院治疗期间发生的费用，按照其本人所参加的本市职工医保或 城乡居民医保的相关规定执行，长期护理保险基金不予支付。故正确答案为 C。", "sec": "行测"}, {"id": 63, "t": "单选题", "q": "单选题63、下列所描述的现象不会出现的是（ ）。", "opts": ["A. 喝可乐或其它碳酸饮料时，表面的泡沫或是聚成一团，或是贴着杯壁，很少有零星的小泡泡独自游荡", "B. 不小心洒落到桌子上的茶或者咖啡，干燥后会留下一个污渍，其边缘部分颜色比中间深", "C. 让小汤匙的凸面轻轻触碰水龙头流出的小水流，水流会被吸引，沿着汤匙的凸面往下流", "D. 让两枚图钉漂在水面上，它们靠近时会相互排斥无法碰在一起"], "a": "D", "e": "本题考查科技常识。A 项正确，D 项错误，“谷物圈效应”是指当能够产生液面变 形的两个物体靠近时，由于系统的重力势能和表面能倾向于最低，物体之间就会互相吸引或 排斥。当两枚图钉放到水面上时，表面张力使它们不会沉入水底，只会在水面形成两个凹 坑；当图钉靠近，凹坑会合并，两枚图钉会碰到一起。对密度比水小的物体来说，情况正好 相反。当泡沫漂浮在水面上，浮力会使它们趋于液面最高点。由于毛细力让泡沫周围和杯壁 附近的液面凸起，凸起靠近时也会合并，泡沫就会聚在一起或是贴近杯壁；B 项正确，洒落 到桌子上的茶或者咖啡，在桌面与液滴之间的交界处，水的蒸发速率要比在液滴与空气之间 的交界处的蒸发速率快。液滴中间的水分子就会携带溶质和颗粒来到液滴与桌面的边缘进行 补充。最终，在水蒸发掉之后，溶质小颗粒们不断在边缘积累，其边缘部分颜色比中间深。 这种现象也被称为“咖啡环效应”；C 项正确，康达效应是指流体有偏离原本流动方向，改 为随着凸出的物体表面流动的倾向。当流体与它流过的物体表面之间存在表面摩擦时，只要 曲率不大，流体就会顺着该物体表面流动。小水流会被汤匙凸面吸引，正是康达效应的典型 表现。故正确答案为 D。", "sec": "行测"}, {"id": 64, "t": "单选题", "q": "微生物发酵是指在适宜的条件下将原料经过特定的代谢途径转化为人类所需产物的过程。下列不涉及微生物发酵的是（ ）。", "opts": ["A. 豆腐", "B. 食醋", "C. 乳酪", "D. 白酒"], "a": "A", "e": "本题考查科技常识。A 项错误，豆腐是黄豆加工后形成富含蛋白质胶体类似于豆 浆，然后加入盐卤或者石膏，使蛋白质凝集变成类似固体的形态，不涉及微生物发酵。B 项 正确，食醋是以粮食等淀粉质为原料，经微生物制曲、糖化、酒精发酵、醋酸发酵等阶段酿 制而成，其主要成分除醋酸外，还含有各种氨基酸、有机酸、糖类、维生素、醇和酯等营养 成分，涉及微生物发酵；C 项正确，奶酪，又名干酪，是一种发酵的牛奶制品，其性质与常 见的酸牛奶有相似之处，都是通过发酵过程来制作的，也都含有可以保健的乳酸菌，但是奶 酪的浓度比酸奶更高，近似固体食物，营养价值也因此更加丰富，涉及微生物发酵。D 项正 确，酒是世界上微生物发酵产量最大的产品，中国传统白酒发酵的实质是，以谷物为主要原 料，利用酵母菌等微生物，使之在生成主要代谢产物乙醇的同时，还形成丰富的香味物质， 涉及微生物发酵。故正确答案为 A。", "sec": "行测"}, {"id": 65, "t": "单选题", "q": "单选题65、成语“沧海桑田”“斗转星移”“日月如梭”所反映的地理现象分别是（ ）。", "opts": ["A. 地壳运动、地球自转运动、地球公转运动", "B. 地壳运动、地球公转运动、地球自转运动", "C. 地球自转运动、地壳运动、地球公转运动", "D. 地球自转运动、地球公转运动、地壳运动"], "a": "B", "e": "本题考查地理国情。“沧海桑田”意思是大海变成农田，农田变成大海。反映了地 壳运动、海陆变迁的地理现象。地壳运动是由于地球内部原因引起的组成地球物质的机械运 动。它可以引起岩石圈的演变，促使大陆、洋底的增生和消亡，并形成海沟和山脉，同时还 导致发生地震、火山爆发等。“斗转星移”意思是星斗变动位置，指季节或时间的变化。北 斗七星围绕北极星自东向西转的规律，我国古代的星象学家把它形象地叫做“斗转星移”， 而通过“斗转星移”的规律，人们能够判断季节和节气时间。季节的变化跟地球公转运动有 关。“日月如梭”意思是太阳和月亮像穿梭一样地来去，形容时间过得很快，反映了日月交 替的现象，而地球的自转运动产生的现象有昼夜交替、太阳的东升西落。因此，B 项正确，A 、C、D 三项错误。故正确答案为 B。", "sec": "行测"}, {"id": 66, "t": "单选题", "q": "中国航天事业与中国传统文化交相辉映，也映衬中国航天不断迈向深空的探索道路，“玉兔号”“夸父一号”“祝融号”所探测的天体，按距离地球由近及远排列正确的是（）。", "opts": ["A. “玉兔号”“祝融号”“夸父一号”", "B. “祝融号”“玉兔号”“夸父一号”", "C. “玉兔号”“夸父一号”“祝融号”", "D. “夸父一号”“祝融号”“玉兔号”"], "a": "A", "e": "本题考查科技常识。“玉兔号”是中国首辆月球车，和着陆器共同组成嫦娥三号探 测器。2013 年 12 月 15 日，“玉兔号”巡视器顺利驶抵月球表面。“夸父一号”是由中国 太阳物理学家自主提出的综合性太阳探测专用卫星。北京时间 2022 年 10 月 9 日，中国在 酒泉卫星发射中心使用长征二号丁运载火箭，成功将“夸父一号”发射升空。“祝融号”是 天问一号任务火星车。 2020 年 7 月 23 日，在中国文昌航天发射场由长征五号遥四运载火 箭发射升空。A 项正确，B、C、D 三项错误，“玉兔号”所探测的天体是月球，月球与地球 近地点的距离是 36.3 万千米；“夸父一号”所探测的天体是太阳，地球距太阳约有 1.5 亿 公里；“祝融号”所探测的天体是火星，地球与火星最近的距离约为 5500 万公里。所探测 天体距离地球由近及远的顺序为月球、火星、太阳，故正确顺序为“玉兔号”“祝融号”“ 夸父一号”。故正确答案为 A。", "sec": "行测"}, {"id": 67, "t": "单选题", "q": "单选题67、下列所描述的现象不会出现的是（ ）。", "opts": ["A. 到大柱子后面可以躲避寒风，柱子越大背后风速越小", "B. 慢慢倒酒水时，酒水会在酒瓶口的边缘附壁流下来", "C. 让小汤匙的凸面轻轻接触水龙头流出的小水流，水流会被吸引，沿着汤匙的凸面往下流", "D. 拿一个鸡蛋放在水龙头的细小水流下，鸡蛋上半部的水流并没有沿着切向垂直向下流，而是继续沿鸡蛋表面汇聚到蛋壳的最低点才往下流"], "a": "A", "e": "本题考查科技常识。康达效应亦称附壁作用或柯恩达效应。流体（水流或气流）由 偏离原本流动方向，改为随着凸出的物体表面流动的倾向。当流体与它流过的物体表面之间 存在表面摩擦时（也可以说是流体粘性），只要曲率不大，流体就会顺着该物体表面流动。A 项错误，到大柱子后面不可以躲避寒风，因为柱子越大背后风速越大；B 项正确，倒酒会沿 着杯壁流下是受到液体表面张力和康达效应共同作用的结果。当慢慢倒酒水的时候，酒水会 在容器表面停留更长时间，水分子与杯壁的粘附力比与水分子的内聚力更大，压力差也将出 现在一侧，酒水将沿着容器的一侧流下；C 项正确，康达效应也称边界吸附效应。当流体经 过具有一定弯度的凸面的时候，有向凸面吸附的趋向。将汤匙的背面接触水流，水流会被吸 引，沿着汤匙的凸面往下流，这是附壁作用的结果。附壁作用令水流一直在汤匙上的凸面流 动；D 项正确，康达效应讲的是流体（水流或气流）有离开本来的流动方向，随着凸出的物 体表面流动的倾向。鸡蛋放在水龙头下水沿着鸡蛋表面流动体现的是康达效应。故正确答案 为 A。", "sec": "行测"}, {"id": 68, "t": "单选题", "q": "隐存物种又称为孪生种，是指两个生物在形态上的区别较为隐蔽，以至于难以区分，但实际上存在生殖隔离，属于不同物种。下列属于隐存物种的是（ ）。", "opts": ["A. 四川种大鲵和广西种大鲵", "B. 驴和马", "C. 白天鹅和黑天鹅", "D. 鸡和鸭"], "a": "A", "e": "本题考查科技常识。根据题干，隐存种是指形态难以区分，但有生殖隔离的不同种 。故判定隐存种需要符合两个条件：①属于不同种，②形态难以区分。A 项，中国大鲵，是 我国的特有种，俗称“娃娃鱼”。由于缺乏显著的外部性状差异，中国大鲵长期以来被认为 是一个物种。但自 2018 年以来，多篇文献表明中国大鲵各地理种群间存在显著的遗传分 化，可能具多个隐存种或有效种，并建议统称为大鲵属物种。目前研究数据支持至少 5 个物 种的划分，这 5 个物种（包括陕西种、四川种、广西种、贵州种和安徽种）与水系分布紧密 相关。故四川种大鲵和广西种大鲵属于隐存物种。与 A 项表述一致；B 项，马和驴同属马 属，但不同种，它们有共同的起源。虽然二者属于不同物种，但在形态上的区别较为明显， 从形体上看，马形体大，驴的形体比马小；从外型上看，马耳朵短，驴耳朵长，马腿长而 细，驴腿短而粗。故马和驴并不属于隐存物种；C 项，黑天鹅和白天鹅同属于鸟纲、雁形目 、鸭科、雁亚科、天鹅族、天鹅属，但它们不同种，是两个物种。但黑天鹤和白天鹅形态区 别较为明显，故白天鹅和黑天鹅并不属于隐存物种；D 项，鸡是人类饲养最普遍的家禽，属 于鸟纲，突胸总目，鸡形目，雉科，原鸡属，家鸡种；鸭是雁形目鸭科鸭亚科水禽的统称， 或称真鸭。二者属于不同物种，但在形态上的区别较为明显，故“鸡和鸭”不属于隐存物种 。故正确答案为 A。", "sec": "行测"}, {"id": 69, "t": "单选题", "q": "甲的牛不慎走失，乙在路边发现，遂牵回家去饲养，并请邻居帮忙寻找失主，一周后，甲听说乙曾捡到一头牛，登门辨认后，确认是自家走失的牛并要求其归还，乙同意返还，但是要求甲支付报酬 2000 元和饲养牛所用的青草、杂粮等费用 200 元，共计 2200 元。甲拒绝支付，两人发生争议。下列说法正确的是（ ）。", "opts": ["A. 甲无需支付任何费用", "B. 甲应当支付 2200 元", "C. 甲应当支付2000 元", "D. 甲应当支付200 元"], "a": "D", "e": "本题考查法律常识。A、B、C 三项错误，D 项正确，根据《中华人民共和国民法典 》第九百七十九条第一款规定：“管理人没有法定的或者约定的义务，为避免他人利益受损 失而管理他人事务的，可以请求受益人偿还因管理事务而支出的必要费用；管理人因管理事 务受到损失的，可以请求受益人给予适当补偿。”题中，乙在路边发现牛并请邻居帮忙寻找 失主，其饲养牛的行为构成无因管理。饲养牛所用的青草、杂粮等费用 200 元属于必要费 用，甲作为受益人应当支付。2000 元报酬无法律依据，甲无需支付。故正确答案为 D。", "sec": "行测"}, {"id": 70, "t": "单选题", "q": "老张和老伴李某育有两儿一女，小儿子早逝。老张不幸去世后，没有留下遗嘱，下列关于遗产继承的说法错误的是（ ）。", "opts": ["A. 遗产分割时，应当先将老张和李某共有的财产分出一半，归李某所有，其余的属于老张的遗产", "B. 大儿子在外地工作，长期对老张不闻不问，应当不分或少分遗产", "C. 女儿因工伤丧失了劳动能力，她的配偶患病长期服药，两个孩子都还在读中学，女儿与其他继承人均等继承遗产份额", "D. 小儿子的妻子陈某念及公婆二人无人照顾、行动不便，平日里悉心照料二老的生活，陈某作为第一顺序继承"], "a": "C", "e": "本题考查法律常识。A 项，根据《中华人民共和国民法典》第一千一百五十三条的 规定，夫妻共同所有的财产，除有约定的外，遗产分割时，应当先将共同所有的财产的一半 分出为配偶所有，其余的为被继承人的遗产；B、C 项，根据《中华人民共和国民法典》第一 千一百三十条的规定，有扶养能力和有扶养条件的继承人，不尽扶养义务的，分配遗产时， 应当不分或者少分。对生活有特殊困难又缺乏劳动能力的继承人，分配遗产时，应当予以照 顾；D 项，根据《中华人民共和国民法典》第一千一百二十九条的规定，丧偶儿媳对公婆， 丧偶女婿对岳父母，尽了主要赡养义务的，作为第一顺序继承人。故正确答案为 C。", "sec": "行测"}, {"id": 71, "t": "单选题", "q": "无论题材如何变化，这位词作者的作品里都流淌着浓厚的传统文化神韵。《国旗之下》也不例外：“北上漠河，早见一番冰雪。南下三沙，海鸥追逐，浪花飞泻。东抵抚远，遥望日出东海。西睡乌恰，背倚天山，大漠横绝。”四六言错落有致，几句话就把祖国的东西南北“四至”的特点______出来，读来荡气回肠。填入划横线部分最恰当的一项是（ ）。", "opts": ["A. 勾勒", "B. 擘画", "C. 叙述", "D. 描绘"], "a": "A", "e": "逻辑填空题。根据空前限定“几句话”可知，本空应体现“用几句话简单的说出了 东西南北的特点”的意思。A 项，“勾勒”指用简练的文笔叙述大概情况，符合文意，当 选；B 项，“擘画”指谋划，经营，或者指谋略，算计，不符合文意，排除；C 项“叙述” 是一种表达方式，指把前因后果说出来，和 D 项“描绘”指画出，描画，均指非常详细的表 述，不能对应“几句话”，排除。故正确答案为 A。", "sec": "行测"}, {"id": 72, "t": "单选题", "q": "翻转课堂是互联网技术迅速发展后兴起的一场全球教育______。翻转课堂并不等同于教师录制线下的课堂教学课程、然后把课程从线下搬到线上进行学习，而是通过转变教学方式，以学生为中心设计线上与线下相融合的混合式学习。填入画横线部分最恰当的一项是（ ）。", "opts": ["A. 革命", "B. 改革", "C. 变革", "D. 革新"], "a": "C", "e": "逻辑填空题。由空前“翻转课堂是……”可知，横线处对“翻转课堂”进行解释， 而空后“翻转课堂……是通过转变教学方式”可知，横线处应表达“教学方式转变”的含义 。A 项，“革命”指根本改革，语义过重，排除；B 项，“改革”指改掉旧的不合理部分， 文段没有体现以前的方式不合理，排除；C 项，“变革”指改变，符合文意，当选；D 项， “革新”指革除旧的，创造新的。文段没有体现去掉旧的，排除。故正确答案为 C。", "sec": "行测"}, {"id": 73, "t": "单选题", "q": "编译工作是寂寞的。一盏灯、一杯茶、一支笔、一沓纸、一摞书、一个悠长的夜晚，这是编译人员在岗位上______的写照。他们不在意外界的喧哗，只坚守内心的宁静。填入划横线部分最恰当的一项是（ ）。", "opts": ["A. 兢兢业业", "B. 克勤克俭", "C. 勤学苦练", "D. 夜以继日"], "a": "A", "e": "逻辑填空题。根据空前编译工作是寂寞的，以及度过的悠长的夜晚，空处应体现编 译人员在岗位上的坚守。A 项，“兢兢业业”形容做事谨慎、勤恳、踏实，符合文意，当 选；B 项，“克勤克俭”指既能勤劳，又能节俭。文中没有体现勤劳节俭，不符合文意，排 除；C 项，“勤学苦练”指认真学习，刻苦训练。文中没有认真刻苦的意思，不符合文意， 排除；D 项，“夜以继日”用晚上的时间接上白天，形容昼夜不停，文中并没有体现白天黑 天连在一起，不符合文意，排除。故正确答案为 A。", "sec": "行测"}, {"id": 74, "t": "单选题", "q": "从众效应扼杀了个人的独立意见和判断力，______了人们的思维，使人变得墨守成规，没有主见。如果你想出类拔萃、事业有成，那就要______从众心理，不人云亦云，遇事冷静，有自己的独立判断。填入横线处的词语最恰当的一组是（ ）。", "opts": ["A. 限制 放弃", "B. 束缚 摒弃", "C. 制约 丢弃", "D. 约束 抛弃"], "a": "B", "e": "逻辑填空题。第一空，根据空后“的思维”可知，该空搭配“思维”。C 项，“制 约”指一种事物的存在和变化是以另一种事物的存在为条件，则前者为后者所制约，与“思 维”搭配不当，排除。第二空，根据空前“想出类拔萃、事业有成”及空后“不人云亦云” 可知，该空要体现“从思想上弃掉从众心理”。A 项，“放弃”指不坚持或丢掉原有的原则 、权利、主张等，一般侧重于不想坚持，不符合文意，排除；B 项，“摒弃”指排除并抛 弃，一般侧重于从思想上舍弃，符合文意，当选；D 项，“抛弃”指扔掉不要了，一般搭配 “财物”等，不符合文意，排除。故正确答案为 B。", "sec": "行测"}, {"id": 75, "t": "单选题", "q": "在进行植树任务时，无人机植树系统首先会对地势展开______，利用地形数据，画出需要再造树林的高分辨率 3D地图，同时画出播种路线图，______播种的最优路线。接着，无人机会在播种范围内飞行并进行“精密的植树活动”，利用空气压力把顶部发芽的种子射进土壤里。依次填入横线处的词语最恰当的一项是（ ）。", "opts": ["A. 勘验 确定", "B. 勘探 拟定", "C. 勘测 设计", "D. 勘察 设定"], "a": "D", "e": "逻辑填空题。第一空，根据空后解释“利用地形数据，画出需要再造树林的高分辨 率 3D 地图”可知，该空要表达的意思为对地形进行查看且与“地势”搭配。A 项，“勘验 ”指调查检验，侧重“检查”的意思，不符合文意，排除；B 项，“勘探”是工程地质勘探 的重要工作方法之一，地质勘探为固定搭配，与地势搭配不当，排除；C 项，“勘测”指施 工前对实地进行调查测量，侧重“测量”的含义，不符合文意，排除；D 项，“勘察”指实 地进行调查、查看，符合文意，当选。故正确答案为 D。", "sec": "行测"}, {"id": 76, "t": "单选题", "q": "早在远古时代，人们就对晴朗夜空中那条神秘的白色亮带——银河充满好奇，并为其______了多个富有诗意的名字以及各种美丽的传说。如今，生活在不夜城里的人们已很难亲眼目睹银河的美景。尽管如此，人们______银河全貌的努力却从未停止。幸运的是，天文学家正借助不断升级的观测技术和设备，将银河系的全貌愈加清晰地展现在我们面前。依次填入划横线部分最恰当的一项是（ ）。", "opts": ["A. 授予 观察", "B. 赋予 窥探", "C. 设计 窥伺", "D. 遐想 考察"], "a": "B", "e": "逻辑填空题。第一空，与“名字”“传说”搭配A 项，“授予”指郑重地给予，一 般搭配“荣誉称号”，搭配不当，排除；B 项，“赋予”指给予，交给，搭配得当，当选；C 项，“设计”指设计师有目标，有计划的进行技术性的创作与创意活动，搭配不当，排除；D 项，“遐想”指超越现实作高远的想象，与“名字”搭配不当，排除。故正确答案为 B。", "sec": "行测"}, {"id": 77, "t": "单选题", "q": "由中国歌剧舞剧院推出的舞蹈剧《英雄儿女》以宏伟壮阔的叙事风格、史诗般的影像______、沉浸式的体验，带领观众走进抗美援朝那段激情燃烧的岁月。该剧汇集多种舞蹈形态，舞美运用高科技手段，为观众营造身临其境之感，并以油画的美术风格力图______那个时代的真实色彩。依次填入划横线部分最恰当的一项是（ ）。", "opts": ["A. 艺术 描摹", "B. 质感 还原", "C. 效果 表现", "D. 元素 展示"], "a": "B", "e": "逻辑填空题。突破口在第二空。根据“……那个时代的真实色彩”可知，这里表达 的意思是，让观众能够身临其境的感受那个年代，且要搭配“真实色彩”。A 项，“描摹” 指照着底样写和画或用语言文字表现人或事物的形象、情状、特性等，不符合语境，排除；B 项，“还原”指事物恢复原状。符合语境，当选；C 项，“表现”指表示出来行为作风或故 意显示自己（含贬义），不符合文意，排除；D 项，“展示”指清楚地摆出来；明显地表现 出来，不符合文意，排除。故正确答案为 B。", "sec": "行测"}, {"id": 78, "t": "单选题", "q": "越来越多的年轻人，不再扎堆前往热门旅游城市，而是选择“反向旅游”：通过选择冷门目的地、打卡非旅游城市、“宅”式度假的方式，让自己的假期更加舒适。“反向旅游”对一些热门旅游目的地的______，能够______其提升景区的服务水平和运营能力，而不是躺在自然资源上坐地收钱。填入横线处的词语最恰当的一组是（ ）。", "opts": ["A. 引流 迫使", "B. 疏导 推动", "C. 分流 倒逼", "D. 引导 反推"], "a": "C", "e": "逻辑填空题。第一空，根据完整的首句可知，该空要表达“冷门目的地分走热门目 的地一部分客源”的意思。A 项，“引流”吸引流量，指的是让更多的人可以看到，不符合 文意，排除；B 项，“疏导”指积极疏通引导，坚持正面教育的一种德育方法，“热门旅游 地”没有需要疏通的地方，排除；C 项，“分流”分流原指河流分道而流，现也可以说行人 车辆等分道行走，符合冷门目的地分走热门目的地一部分客源的意思，当选；D 项，“引导 ”指通过行为帮人走出困境，或是带着人向某个目标集体行动，通过行为帮人走出困境，不 符合文意，排除。故正确答案为 C。", "sec": "行测"}, {"id": 79, "t": "单选题", "q": "国家文化公园的建设将展示最具有独特性、生命力、影响力和传播力的文化______，人们在游览体验中感受文化、领悟文化，进而增强文化自信心和提升文化认同感，在心意相通里让文脉______流淌。在这一过程中国家文化公园实现了文化资源保护、利用和传承的统一。依次填入划横线部分最恰当的一项是（ ）。", "opts": ["A. 风景 永远", "B. 地标 持续", "C. 景物 长远", "D. 景观 永续"], "a": "D", "e": "逻辑填空题。第一空，根据“国家文化公园的建设将展示最具有独特性、生命力、 影响力和传播力的文化______”可知，横线处应与“文化”搭配。A 项，“风景”指的是一 定地区内由自然环境、建筑物等形成的可供人观赏的景象，符合文意，保留；B 项，“地标 ”指某地方具有独特地理特色的建筑物或者自然物，不符合文意，排除；C 项，“景物”指 景色和事物，符合文意，保留；D 项，“景观”指一定区域呈现的景象，符合文意，保留。 第二空，根据“在这一过程中国家文化公园实现了文化资源保护、利用和传承的统一”可 知，横线处体现的意思是文脉可以永远继续并传承下去。A 项，“永远”指时间长久，没有 终止，体现不出“传承”之意，排除；C 项，“长远”指的是将来很长时间，只是侧重时间 层面，体现不出“传承”之意，排除；D 项，“永续”指永远继续，文脉需要继续并传承下 去，符合文意，当选。故正确答案为 D。", "sec": "行测"}, {"id": 80, "t": "单选题", "q": "塞尚对后来的画家产生过巨大影响，他的艺术展示了某种可能性，即从事物现象的复杂性转换到构图的几何简洁性。______，让马蒂斯模仿塞尚的“构筑性的笔触”是不可能的，他们属于两个不同的体系，______是色彩表现的方式迥异。塞尚是在忠实地表现自然，马蒂斯更像是在随心所欲地诠释自然。依次填入横线处最恰当的一组是（ ）。", "opts": ["A. 因此 但", "B. 然而 尤其", "C. 但是 只", "D. 可是 特别"], "a": "B", "e": "逻辑填空题。第一空。根据“塞尚对后来的画家产生过巨大影响，他的艺术展示了 某种可能性”以及“让马蒂斯模仿塞尚的‘构筑性的笔触’是不可能的”可知，文中前后语 义相反，且空后的程度比空前的重。故此处应填入能表达程度加重的转折关联词。A 项，“ 因此”表因果关系，排除；D 项“可是”没有 B 项“然而”、C 项“但是”程度重，故排除 D 项。第二空。根据“他们属于两个不同的体系”以及“色彩表现的方式迥异”可知，语义 呈现递进关系。B 项，“尤其”符合文意，当选；C 项，“只”无递进含义，排除。故正确 答案为 B。", "sec": "行测"}, {"id": 81, "t": "单选题", "q": "彩礼在古代称为聘礼或聘财，古代法律对聘财的认定标准相当______，对聘财的形式及数量并无严格的限定。如唐律中“聘财不拘重轻，但同媒约言明纳送礼仪者方是。”立法者的意图非常明确，聘礼不以钱物多少为限，只要双方具有以此作为聘礼的共同认识，即为法律所______。依次填入划横线部分最恰当的一组是（ ）。", "opts": ["A. 宽松 认可", "B. 明确 认同", "C. 模糊 承认", "D. 宽泛 许可"], "a": "A", "e": "逻辑填空题。第一空。根据空后解释“对聘财的形式及数量并无严格的限定”可 知，古代法律对彩礼的认定标准不严格。A 项，“宽松”指宽绰、不拥挤，能体现不严格， 当选；B 项，“明确”指清晰明白，确定，不符合文意，排除；C 项，“模糊”轮廓模糊不 清，不能体现不严格，排除；D 项，“宽泛”指涉及的面宽，多形容范围广，而不是不严 格，排除。故正确答案为 A。", "sec": "行测"}, {"id": 82, "t": "单选题", "q": "中国元素与现代奥运的激情碰撞、科技赋能下的______、独具东方美学色彩的审美意象……2022 年北京冬奥会、冬残奥会虽然已落下帷幕，但“两个奥运”中形象鲜活的中国元素与创意无限的艺术______将永远镌刻在奥林匹克的历史中。依次填入划横线部分最恰当的一项是（ ）。", "opts": ["A. 别出心裁反响", "B. 匠心独运呈现", "C. 推陈出新 构思D、标新立异 表达B限的艺术______将永远镌刻在奥林匹克的历史中”可知，该空应体现“奥林匹克中科技赋能下的创意艺术”。A 项，“别出心裁”指独创一格，侧重于想法与众不同，不符合文意，排除；B 项，“匠心独运”指文学艺术方面创造性的构思，符合文意，当选；C 项，“推陈出新”指去掉旧事物的糟粕，吸取其精华，使它以新的面目出现，文段并没有体现去掉旧事物，不符合文意，排除；D 项，“标新立异”指提出新奇的见解、主张，无法体现创意艺术，不符合文意，排除。故正确答案为 B。"], "a": "", "e": "逻辑填空题。第一空，根据空后“但‘两个奥运’中形象鲜活的中国元素与创意无", "sec": "行测"}, {"id": 83, "t": "单选题", "q": "如果我们放宽视野，不难发现以同一性为基础的韵律原则在汉语文学之中是______的。宽泛意义上的“偶语”几乎是充盈整个汉语文章体式的“韵律结构”，不仅让语言具有内在的对称感与______感，而且也是文章气势的来源。依次填入横线处的词语最恰当的一项是（ ）。", "opts": ["A. 蔚为大观融洽", "B. 信手拈来愉悦", "C. 更仆难尽 和谐D、无所不在 平衡D在汉语文学之中是很多的。A 项，“蔚为大观”形容事物美好而繁多，给人一种盛大的印象，文段并未体现盛大印象，排除；B 项，“信手拈来”多指写文章时能自由纯熟地选用词语或应用典故，用不着怎么思考，不符合文意，排除；C 项，“更仆难尽”形容人或事物很多，数也数不过来，符合文意，保留；D 项，“无所不在”指到处都存在，到处都有，符合文意，保留。第二空，与“对称感”构成并列。C 项，“和谐”指的是和睦协调，与“对称感”不能构成并列，排除；D 项，“平衡”指的是衡器两端承受的重量相等，或两物齐平如衡，能与“对称感”并列，当选。故正确答案为 D。"], "a": "", "e": "逻辑填空题。第一空。根据空后解释“几乎充盈整个汉语文章体式”可知，同一性", "sec": "行测"}, {"id": 84, "t": "单选题", "q": "天地英雄气，千秋尚凛然。清明节既是礼祭祖先、______的日子，也是寄托哀思、祭奠英烈的时刻。社会各界以多种形式表达对英烈深切的缅怀之情和崇高敬意，追思他们的英勇事迹，感受他们的高尚精神，在新征程中______奋进力量。依次填入划横线部分最恰当的一项是（ ）。", "opts": ["A. 睹物思人聚齐", "B. 鉴往知来汇聚", "C. 抚今追昔 聚合D、慎终追远 凝聚D语义相近。A 项，“睹物思人”指看见离别的人留下的东西就想起了这个人，不含礼祭祖先之意，排除；B 项，“鉴往知来”指根据以往的情形便知道以后怎样发生变化，排除；C项，“抚今追昔”指接触到当前的情景；回想追念过去的情形，排除；D 项，“慎终追远”指慎重办理父母丧事，虔诚祭祀远代祖先，符合文意，当选。故正确答案为 D。"], "a": "", "e": "逻辑填空题。第一空，由空前“顿号”可知，横线处要和“礼祭祖先”形成并列，", "sec": "行测"}, {"id": 85, "t": "单选题", "q": "统一市场是发达市场经济的重要标志，是大国经济实现高质量发展的制度基础。进入新发展阶段，作为世界最大的发展中国家，中国加快建设全国统一大市场，是构建高水平社会主义市场经济体制的______选择，也是构建新发展格局、实现高质量发展的基础______和内在______。依次填入横线处最恰当的一组是（ ）。", "opts": ["A. 必定 支持需求", "B. 必然 支撑 要求", "C. 必须 支架 需要", "D. 必由 支柱 请求"], "a": "B", "e": "逻辑填空题。第一空。根据“统一市场是发达市场经济的重要标志，是大国经济实 现高质量发展的制度基础”可知，横线处要体现“中国加快建设全国统一大市场”的重要性 且是不可避免的选择。A 项，“必定”指一定，和“选择”搭配不当，排除；B 项，“必然 ”指客观事物联系和发展的合乎规律的、确定不移的趋势，是在一定条件下的不可避免性和 确定性，符合文意，且“必然选择”为常用搭配，当选；C 项，“必须”指事理上的必要和 情理上的必要，有强调的语气，多作状语，语法搭配不当，排除；D 项，“必由”指必定要 经过的道路，常用搭配“必由之路”，搭配不当，排除。故正确答案为 B。", "sec": "行测"}, {"id": 86, "t": "单选题", "q": "老字号拥有品牌优势，在做精做强、发展壮大方面具有独特优势。老字号所______的独特产品、精湛技艺和经营理念，具有______的品牌价值、经济价值和文化价值，它们______着优秀的中华民族文化，是新时期弘扬商业文明的核心内涵和宝贵财富。依次填入划横线部分最恰当的一项是（）。", "opts": ["A. 秉持 名利双收 凝聚", "B. 传承 不可估量 承载", "C. 恪守 管中窥豹发扬", "D. 弘扬 守正创新锤炼"], "a": "B", "e": "逻辑填空题。第一空，不易排除。看第二空，根据前文“老字号”和“精湛技艺和 经营理念”以及空后限定“品牌价值”可知，横线处应体现“品牌价值的重要性”之意。B 项，“不可估量”指难以估计，符合文意，当选；A 项“名利双收”指既得名声，又获利 益，C 项“管中窥豹”指比喻只看到事物的一部分，指所见不全面或略有所得，以及 D 项“ 守正创新”指守正，就是坚守正道，坚持按规律办事，创新即充分发挥主观能动性，改变旧 的、创造新的事物，均不符合文意，排除。故正确答案为 B。", "sec": "行测"}, {"id": 87, "t": "单选题", "q": "21 世纪诗坛尽管______，众声喧哗，但在重量级诗人的输送上逊色于上世纪八九十年代。十足才子气背后大手笔缺位，群星闪烁而无月，多元并举背面是欠缺规范，许多诗人理想______，有理论锐气，但创作上尚未提供与理论______的文本。依次填入横线处最恰当的一组是（ ）。", "opts": ["A. 林林总总高远 匹配", "B. 光怪陆离高蹈 配合", "C. 多姿多彩 远大搭配", "D. 泥沙俱下 崇高契合"], "a": "A", "e": "逻辑填空题。第一空，空后“但”表转折，转折前后语义相反，转折之后强调“诗 人数量不如以前”即数量少，可知横线处应表达“数量多”的含义。A 项，“林林总总”指 多得成群，符合文意，当选；B 项，“光怪陆离”指奇形怪状，五颜六色，和 C 项“多姿多 彩”指颜色形态多样，均不符合文意，排除；D 项，“泥沙俱下”指好的和坏的混杂在一 起，不符合文意，排除。故正确答案为 A。", "sec": "行测"}, {"id": 88, "t": "单选题", "q": "近年来，AI（人工智能）开始运用于香水制作行业。与需要几十年时间训练嗅觉的调香师不同，AI 调香不依靠嗅觉制作香水，而是利用先进的机器学习算法，分析和学习现有香水的原料与配方，将其成分对比分析，输出一个新配方。它还能结合历史销售数据和行业趋势等信息，获取香水在不同性别、年龄和销售地区的受欢迎程度，预测人类的喜好，进而创造出针对目标人群的新香水配方。这段文字重在说明（ ）。", "opts": ["A. AI 调香可大大缩短香水的研发周期", "B. AI 调香研发的新型产品优于调香师", "C. AI 调香可以获得受用户欢迎的最佳解", "D. AI 调香在香水制作行业中运用前景广阔"], "a": "D", "e": "主旨概括题。“近年来”引出背景，AI 适用于香水制作行业。然后阐述 AI 利用先 进的算法对现有原料和配方进行比对，能够迅速得到新配方，体现 AI 能够加速获取香水新 配方。然后通过“它还能”对 AI 的作用进行阐述，通过多种信息进行分析，创造出针对目 标人群的新香水配方。故文段重点是 AI 在香水行业发挥的重要作用，对应 D 项。A 项，AI 调香缩短选香水研发周期，只体现了 AI 的一方面作用，片面，排除；B 项，文段并没有对 AI 和调香师的优劣进行对比，无中生有，排除；C 项，强调香水配方对用户的针对性，片 面，排除。故正确答案为 D。", "sec": "行测"}, {"id": 89, "t": "单选题", "q": "单选题89、月亮 对于 （ ） 相当于 理发师 对于 （ ）。", "opts": ["A. 潮汐；剪刀B、太阳；学徒", "C. 月光；造型师", "D. 天体；职业D潮汐是由月亮引起的，二者为因果关系，剪刀是理发师理发时使用的工具，二者为工具对应关系，前后逻辑关系不一致，排除；B项：月亮和太阳是并列关系，有的学徒是理发师，有的学徒不是理发师，有的理发师是学徒，有的理发师不是学徒，二者为交叉关系，前后逻辑关系不一致，排除；C项：月光是从月亮照射到地球的光线，但光线来源于太阳，二者为对应关系，有的造型师是理发师，有的造型师不是理发师，有的理发师是造型师，有的理发师不是造型师，二者为交叉关系，前后逻辑关系不一致，排除；D项：月亮是一个天体，理发师是一种职业，均为种属关系，前后逻辑关系一致，当选。故正确答案为D。"], "a": "", "e": "A项：潮汐是一种自然现象，指海水在月亮等天体作用下所产生的周期性运动，因此", "sec": "行测"}, {"id": 90, "t": "单选题", "q": "单选题90、“鸟鸣山更幽”包含的哲理是（）。", "opts": ["A. 静止的绝对性与运动的相对性", "B. 运动的相对性", "C. 静止的绝对性", "D. 静止的相对性与运动的绝对性"], "a": "D", "e": "本题反映的是静止的相对性与运动的绝对性。故正确答案为D。", "sec": "行测"}, {"id": 91, "t": "单选题", "q": "单选题91、葡萄：葡萄酒（ ）。", "opts": ["A. 黄金：黄金档", "B. 香蕉：香蕉水", "C. 杜鹃：杜鹃花", "D. 枇杷：枇杷膏"], "a": "D", "e": "对应关系。葡萄是制作葡萄酒的原材料，二者为原材料对应关系。A 项，黄金和黄 金档无明显逻辑关系，与题干逻辑关系不一致，排除；B 项，香蕉和香蕉水无明显逻辑关 系，与题干逻辑关系不一致，排除；C 项，杜鹃和杜鹃花无明显逻辑关系，与题干逻辑关系 不一致，排除；D 项，枇杷是制作枇杷膏的原材料，二者为原材料对应关系，与题干逻辑关 系一致，当选。故正确答案为 D。", "sec": "行测"}, {"id": 92, "t": "单选题", "q": "单选题92、天荒地老：海枯石烂（ ）。", "opts": ["A. 同心同德：反目成仇", "B. 披荆斩棘：斩钉截铁", "C. 孜孜矻矻：夙夜不懈", "D. 望而却步：望风披靡"], "a": "C", "e": "近义关系。“天荒地老”、“海枯石烂”都形容历史久远，比喻坚定的意志永远不 变。A 项，“同心同德”形容思想统一信念一致，“反目成仇”意思是翻脸变成仇人。二者 无明显逻辑关系，与题干逻辑关系不一致，排除；B 项，“披荆斩棘”指拨开荆丛，砍掉荆 棘；比喻开创事业或在前进道路上清除障碍，艰苦奋斗。“斩钉截铁”形容说话或行动坚决 果断，毫不含糊。二者无明显逻辑关系，与题干逻辑关系不一致，排除；C 项，“孜孜矻矻 ”、“夙夜不懈”都指勤勉不懈，二者为近义关系，与题干逻辑关系一致，当选；D 项，“ 望而却步”指看到了可怕的或力不能及的事而往后退缩。“望风披靡”比喻军队毫无斗志， 老远看到对方的气势很盛，没有交锋就溃散了，二者无明显逻辑关系，与题干逻辑关系不一 致，排除。故正确答案为 C。", "sec": "行测"}, {"id": 93, "t": "单选题", "q": "单选题93、全真阅读：沉浸式（ ）。", "opts": ["A. 企业销售：盈利性", "B. 乡村教育：均衡化", "C. 人工智能：数字化", "D. 线上课程：直播性"], "a": "C", "e": "必然属性关系。题干逻辑关系：全真阅读一定是沉浸式的，沉浸式是全真阅读的必 然属性。A 项，企业销售可能是盈利性的，盈利性为企业销售的或然属性，与题干逻辑关系 不一致，排除；B 项，乡村教育可能是均衡化的，均衡化为乡村教育的或然属性，与题干逻 辑关系不一致，排除；C 项，人工智能一定是数字化的，数字化为人工智能的必然属性，与 题干逻辑关系一致，当选；D 项，线上课程可能是直播性的，直播性为线上课程的或然属 性，与题干逻辑关系不一致，排除。故正确答案为 C。", "sec": "行测"}, {"id": 94, "t": "单选题", "q": "单选题94、龋齿：嗜食甜品（ ）。", "opts": ["A. 海鲜：食物过敏", "B. 缺钙：骨质疏松", "C. 运动：增强体质", "D. 塌方：地下渗水"], "a": "D", "e": "因果关系。嗜食甜品可能会导致龋齿的结果。A 项，吃海鲜可能会导致食物过敏， 但是位置与题干相反，排除；B 项，缺钙可能会导致骨质疏松的结果，但是位置与题干相 反，排除；C 项，增强体质是运动的目的，与题干逻辑关系不一致，排除； D 项，地下渗水 可能会导致塌方的结果，与题干逻辑关系一致，当选。故正确答案为 D。", "sec": "行测"}, {"id": 95, "t": "单选题", "q": "单选题95、针灸：疏通经脉（ ）。", "opts": ["A. 慢跑：增强体质", "B. 涅槃：化茧成蝶", "C. 缺铁：供血不足", "D. 促销：商品展示"], "a": "A", "e": "功能对应关系。“针灸”具有“疏通经脉”的作用，二者为功能对应关系。A 项， “慢跑”具有“增强体质”的作用，二者为功能对应关系，与题干逻辑关系一致，当选；B 项，“涅槃”与“化茧成蝶”二者为表述含义相近，二者为近义词关系，与题干逻辑关系不 一致，排除；C 项，“缺铁”是“供血不足”的原因之一，二者属于因果关系，与题干逻辑 关系不一致，排除；D 项，通过“商品展示”的方式进行“促销”，二者属于方式对应，与 题干逻辑关系不一致，排除。故正确答案为 A。", "sec": "行测"}, {"id": 96, "t": "单选题", "q": "单选题96、游艇：钢材：船舶（ ）。", "opts": ["A. 古玺：玉石：隶书", "B. 旗袍：丝绸：服饰", "C. 版画：油画：绘画", "D. 砧板：厨具：木材"], "a": "B", "e": "材料对应+种属关系。钢材是制作游艇的材料，游艇是船舶的一种。A 项，玉石是制 作古玺的材料，隶书是一种字体，与古玺不是种属关系，与题干逻辑不一致，排除。B 项， 丝绸是制作旗袍的材料，旗袍属于服饰的一种，与题干逻辑一致，当选；C 项，版画和油画 是两种不同的艺术形式，二者是并列关系，与题干逻辑不一致，排除；D 项，砧板属于厨 具，厨具不是制作砧板的材料，与题干逻辑不一致，排除；故正确答案为 B。", "sec": "行测"}, {"id": 97, "t": "单选题", "q": "单选题97、书柜：书籍：书页（ ）。", "opts": ["A. 花坛：花卉：花蕊", "B. 舞池：舞蹈：舞伴", "C. 面粉：面条：面片", "D. 鞋盒：鞋子：鞋油"], "a": "A", "e": "地点对应+组成关系。书籍放在书柜里，书页是书籍的组成部分。A 项，花卉长在花 坛里，花蕊是花卉的组成部分，与题干逻辑一致，当选；B 项，鞋子放在鞋盒里，但是鞋油 不是鞋子的组成部分，与题干逻辑不一致，排除；C 项，面粉是面条的原材料，与题干逻辑 不一致，排除；D 项，舞伴不是舞蹈的组成部分，与题干逻辑不一致，排除。故正确答案为 A。", "sec": "行测"}, {"id": 98, "t": "单选题", "q": "单选题98、历史朝代：东汉：北宋（ ）。", "opts": ["A. 热带气旋：台风：飓风", "B. 敬辞称谓：家父：令尊", "C. 十二时辰：丑时：午时", "D. 交通工具：火车：马车"], "a": "C", "e": "近义词。题干逻辑关系：东汉与北宋为反对关系，并且按时间顺序排列先东汉后北 宋，分别与历史朝代构成种属关系。A 项，台风与飓风只是不同国家称呼不一样，二者为同 一关系，与题干逻辑关系不一致，排除；B 项，家父与令尊指的都是父亲，二者为同一关 系，与题干逻辑关系不一致，排除；C 项，丑时与午时为反对关系，并且按时间顺序排列先 丑时后午时，分别与十二时辰构成种属关系，与题干逻辑关系一致，当选；D 项，火车与马 车为反对关系，但是按照时间顺序应先马车后火车，位置错误，与题干逻辑关系不一致，排 除。故正确答案为 C。", "sec": "行测"}, {"id": 99, "t": "单选题", "q": "单选题99、细胞核：细胞质：细胞（ ）。", "opts": ["A. 绝缘体：半导体：导电", "B. 碳中和：碳达峰：环保", "C. 真皮：表皮：皮肤", "D. 牙冠：牙齿：牙龈"], "a": "C", "e": "组成关系+并列关系。题干逻辑关系：细胞核和细胞质都是细胞的一部分，为组成关 系，细胞核和细胞质为并列关系。A 项，绝缘体和半导体为不同的物体，但他们不是导电的 一部分，与题干逻辑关系不一致，排除；B 项，碳中和与碳达峰是实现环保提出的目标，与 题干逻辑关系不一致，排除；C 项，真皮和表皮都是皮肤的一部分，与题干逻辑关系一致， 当选；D 项，牙冠是牙齿的一部分，与题干逻辑关系不一致，排除。故正确答案为 C。", "sec": "行测"}, {"id": 100, "t": "单选题", "q": "单选题100、佶屈聱牙 对于（ ）相当于（ ）对于 教诲。", "opts": ["A. 文句；春风化雨", "B. 书写；和光同尘", "C. 表达；无微不至", "D. 描述；刚柔相济"], "a": "A", "e": "对应关系。代入选项分析。A 项，佶屈聱牙形容文词艰涩生僻、拗口难懂，与文句 是对应关系，春风化雨比喻良好的熏陶和教育，与教诲是对应关系，前后逻辑关系一致，当 选；B 项，佶屈聱牙形容文词艰涩生僻、拗口难懂，与书写无明显逻辑关系，和光同尘形容 与世俗混同，不突出自己，不露锋芒，与世无争，与教诲无明显逻辑关系，排除；C 项，佶 屈聱牙形容文词艰涩生僻、拗口难懂，与表达无明显逻辑关系，无微不至指无论如何细微， 都能周全照应，与教诲无明显逻辑关系，排除；D 项，佶屈聱牙形容文词艰涩生僻、拗口难 懂，与描述无明显逻辑关系，刚柔并济意思是刚强的和柔和的互相配合，与教诲无明显逻辑 关系，排除。故正确答案为A。", "sec": "行测"}, {"id": 1, "t": "单选题", "q": "被誉为京城亲情驿站的北京（     ）邮政局，六十多年来，一直坚持“视用户为亲人”的服务理念。", "opts": ["A. 东四", "B. 角门", "C. 北苑", "D. 马家堡"], "a": "A", "e": "本题考察邮政通识相关知识。正确答案为A。\n选项分析：\n✅ A. 东四 ← 正确答案\n❌ B. 角门 ← 排除\n❌ C. 北苑 ← 排除\n❌ D. 马家堡 ← 排除", "sec": "邮政通识"}, {"id": 2, "t": "单选题", "q": "（     ）被称为“马班邮路上的忠诚信使”。", "opts": ["A. 尼玛拉木", "B. 其美多吉", "C. 王顺友", "D. 唐真亚"], "a": "C", "e": "本题考察邮政通识相关知识。正确答案为C。\n选项分析：\n❌ A. 尼玛拉木 ← 排除\n❌ B. 其美多吉 ← 排除\n✅ C. 王顺友 ← 正确答案\n❌ D. 唐真亚 ← 排除", "sec": "邮政通识"}, {"id": 3, "t": "单选题", "q": "中国邮政的服务宗旨是（     ）。", "opts": ["A. 情系万家 信达天下", "B. 人民邮政为人民", "C. 爱岗敬业 恪尽职守", "D. 建设世界一流邮政企业"], "a": "B", "e": "本题考察邮政通识相关知识。正确答案为B。\n选项分析：\n❌ A. 情系万家 信达天下 ← 排除\n✅ B. 人民邮政为人民 ← 正确答案\n❌ C. 爱岗敬业 恪尽职守 ← 排除\n❌ D. 建设世界一流邮政企业 ← 排除", "sec": "邮政通识"}, {"id": 4, "t": "单选题", "q": "新疆维吾尔自治区的简称是（　　）。", "opts": ["A. 西", "B. 青", "C. 宁", "D. 新"], "a": "D", "e": "本题考察邮政通识相关知识。正确答案为D。\n选项分析：\n❌ A. 西 ← 排除\n❌ B. 青 ← 排除\n❌ C. 宁 ← 排除\n✅ D. 新 ← 正确答案", "sec": "邮政通识"}, {"id": 5, "t": "单选题", "q": "邮政普遍服务业务范围内的邮件和汇款的损失赔偿，适用（　　）规定。", "opts": ["A. 民法典", "B. 邮政法", "C. 民事诉讼法", "D. 刑法"], "a": "B", "e": "本题考察邮政通识相关知识。正确答案为 ": "多选题", "q": "马克思、恩格斯在领导无产阶级斗争的实践中，始终强调领袖权威的必要性和重要性。马克思说过，“一个单独的提琴手是自己指挥自己，一个乐队就需要一个乐队指挥。”恩格斯也指出，“没有权威，就不可能有任何的一致行动。”并以大海航行的例子说明权威的重要性。在总结巴黎公社失败的经验教训时，马克思深刻指出，“巴黎公社遭到灭亡，就是由于缺乏集中和权威”。这表明，无产阶级领袖在历史上能够（）。", "opts": ["A. 引领社会发展的方向", "B. 影响历史事件的进程", "C. 凝聚人民群众的力量", "D. 创造人类社会的历史"], "a": "ABC", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n✅ A. 引领社会发展的方向 ← 正确\n✅ B. 影响历史事件的进程 ← 正确\n✅ C. 凝聚人民群众的力量 ← 正确\n❌ D. 创造人类社会的历史 ← 不属于\n因此正确答案为ABC。多选题需全部选对才得分。", "sec": "思政"}, {"id": 59, "t": "多选题", "q": "中国特色社会主义事业总体布局是“五位一体”，包括（）。", "opts": ["A. 经济建设", "B. 政治建设", "C. 文化建设", "D. 社会建设", "E. 生态文明建设"], "a": "ABCDE", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n✅ A. 经济建设 ← 正确\n✅ B. 政治建设 ← 正确\n✅ C. 文化建设 ← 正确\n✅ D. 社会建设 ← 正确\n✅ E. 生态文明建设 ← 正确\n因此正确答案为ABCDE。多选题需全部选对才得分。", "sec": "思政"}, {"id": 60, "t": "多选题", "q": "二十大报告指出，增进民生福祉，提高人民生活品质我们要（）。", "opts": ["A. 完善分配制度", "B. 实施就业优先战略", "C. 健全社会保障体系", "D. 推进健康中国建设"], "a": "ABCD", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n✅ A. 完善分配制度 ← 正确\n✅ B. 实施就业优先战略 ← 正确\n✅ C. 健全社会保障体系 ← 正确\n✅ D. 推进健康中国建设 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "思政"}, {"id": 61, "t": "多选题", "q": "提高公共安全治理水平（），加强个人信息保护。", "opts": ["A. 树立安全第一的意识", "B. 坚持安全第一、预防为主", "C. 完善公共安全体系", "D. 提高防灾减灾救灾和急难险重突发公共事件处理保障能力"], "a": "BCD", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n❌ A. 树立安全第一的意识 ← 不属于\n✅ B. 坚持安全第一、预防为主 ← 正确\n✅ C. 完善公共安全体系 ← 正确\n✅ D. 提高防灾减灾救灾和急难险重突发公共事件处理保障能力 ← 正确\n因此正确答案为BCD。多选题需全部选对才得分。", "sec": "思政"}, {"id": 62, "t": "多选题", "q": "全党必须牢记，坚持党的全面领导是坚持和发展中国特色社会主义的必由之路，（）。", "opts": ["A. 中国特色社会主义是实现中华民族伟大复兴的必由之路", "B. 团结奋斗是中国人民创造历史伟业的必由之路", "C. 贯彻新发展理念是新时代我国发展壮大的必由之路", "D. 全面从严治党是党永葆生机活力、走好新的赶考之路的必由之路"], "a": "ABCD", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n✅ A. 中国特色社会主义是实现中华民族伟大复兴的必由之路 ← 正确\n✅ B. 团结奋斗是中国人民创造历史伟业的必由之路 ← 正确\n✅ C. 贯彻新发展理念是新时代我国发展壮大的必由之路 ← 正确\n✅ D. 全面从严治党是党永葆生机活力、走好新的赶考之路的必由之路 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "思政"}, {"id": 63, "t": "多选题", "q": "二十大指出，中国式现代化是中国共产党领导的社会主义现代化，具有各国现代化的共同特征，更有基于自己国情的中国特色。下列对中国是现代化的描述正确的是（）", "opts": ["A. 中国是现代化是人口规模巨大的现代化", "B. 中国是现代化是全体人民共同富裕的现代化", "C. 中国是现代化是物质文明和精神文明相协调的现代化", "D. 中国是现代化是人与自然和谐共生的现代化"], "a": "ABCD", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n✅ A. 中国是现代化是人口规模巨大的现代化 ← 正确\n✅ B. 中国是现代化是全体人民共同富裕的现代化 ← 正确\n✅ C. 中国是现代化是物质文明和精神文明相协调的现代化 ← 正确\n✅ D. 中国是现代化是人与自然和谐共生的现代化 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "思政"}, {"id": 64, "t": "多选题", "q": "我们坚持可持续发展，坚持（）、（）、自然恢复为主的方针，像保护眼睛一样保护自然和生态环境，坚定不移走生产发展、生活富裕、生态良好的（），实现中华民族永续发展。", "opts": ["A. 节约优先", "B. 保护在后", "C. 保护优先", "D. 文明发展道路"], "a": "ACD", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n✅ A. 节约优先 ← 正确\n❌ B. 保护在后 ← 不属于\n✅ C. 保护优先 ← 正确\n✅ D. 文明发展道路 ← 正确\n因此正确答案为ACD。多选题需全部选对才得分。", "sec": "思政"}, {"id": 65, "t": "多选题", "q": "广大青年要坚定不移听党话、跟党走，怀抱梦想又脚踏实地，敢想敢为又善作善成，立志做（）的新时代好青年，让青春在全面建设社会主义现代化国家的火热实践中绽放绚丽之花。", "opts": ["A. 能吃苦", "B. 肯奋斗", "C. 有理想", "D. 敢担当"], "a": "ABCD", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n✅ A. 能吃苦 ← 正确\n✅ B. 肯奋斗 ← 正确\n✅ C. 有理想 ← 正确\n✅ D. 敢担当 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "思政"}, {"id": 66, "t": "多选题", "q": "必须坚定不移走中国特色社会主义政治发展道路，坚持（）有机统一。", "opts": ["A. 从严治党", "B. 党的领导", "C. 依法治国", "D. 人民当家作主"], "a": "BCD", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n❌ A. 从严治党 ← 不属于\n✅ B. 党的领导 ← 正确\n✅ C. 依法治国 ← 正确\n✅ D. 人民当家作主 ← 正确\n因此正确答案为BCD。多选题需全部选对才得分。", "sec": "思政"}, {"id": 67, "t": "多选题", "q": "面对人口、资源、环境问题，我们的必然选择是（）。", "opts": ["A. 追求经济利益最大化", "B. 坚持绿色发展", "C. 走生产发展、生活富裕、生态良好的文明发展道路", "D. 先污染后治理"], "a": "BC", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n❌ A. 追求经济利益最大化 ← 不属于\n✅ B. 坚持绿色发展 ← 正确\n✅ C. 走生产发展、生活富裕、生态良好的文明发展道路 ← 正确\n❌ D. 先污染后治理 ← 不属于\n因此正确答案为BC。多选题需全部选对才得分。", "sec": "思政"}, {"id": 68, "t": "多选题", "q": "下列属于文化自信的来源的是（）。", "opts": ["A. 文化的优秀", "B. 国家的强大", "C. 人民的力量", "D. 外来文化的影响"], "a": "ABC", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n✅ A. 文化的优秀 ← 正确\n✅ B. 国家的强大 ← 正确\n✅ C. 人民的力量 ← 正确\n❌ D. 外来文化的影响 ← 不属于\n因此正确答案为ABC。多选题需全部选对才得分。", "sec": "思政"}, {"id": 69, "t": "多选题", "q": "提高公共安全治理水平（），加强个人信息保护。", "opts": ["A. 树立安全第一的意识", "B. 坚持安全第一、预防为主", "C. 完善公共安全体系", "D. 提高防灾减灾救灾和急难险重突发公共事件处理保障能力"], "a": "BCD", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n❌ A. 树立安全第一的意识 ← 不属于\n✅ B. 坚持安全第一、预防为主 ← 正确\n✅ C. 完善公共安全体系 ← 正确\n✅ D. 提高防灾减灾救灾和急难险重突发公共事件处理保障能力 ← 正确\n因此正确答案为BCD。多选题需全部选对才得分。", "sec": "思政"}, {"id": 70, "t": "多选题", "q": "党的二十大大会的主题是（），全面贯彻新时代中国特色社会主义思想，（），自信自强、守正创新，踔厉奋发、勇毅前行，为全面建设社会主义现代化国家、全面推进中华民族伟大复兴而团结奋斗。", "opts": ["A. 高举中国特色社会主义伟大旗帜", "B. 弘扬伟大建党精神", "C. 自强自信", "D. 独立自主"], "a": "AB", "e": "本题考察思政相关知识，需全面掌握。\n逐项分析：\n✅ A. 高举中国特色社会主义伟大旗帜 ← 正确\n✅ B. 弘扬伟大建党精神 ← 正确\n❌ C. 自强自信 ← 不属于\n❌ D. 独立自主 ← 不属于\n因此正确答案为AB。多选题需全部选对才得分。", "sec": "思政"}, {"id": 71, "t": "判断题", "q": "2025年,我国实现了全国范围内的5G网络全覆盖。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "虽然 2025 年我国 5G 网络建设取得了显 著进展，但由于地理环境、成本等因素的 限制，尚未实现全国范围内的5G 网络全覆 盖。", "sec": "思政"}, {"id": 72, "t": "判断题", "q": "2025年,我国不再强调GDP增长速度，只注重经济发展质量。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察思政相关知识。", "sec": "思政"}, {"id": 4, "t": "判断题", "q": "中国梦是每一个中华儿女的共同期盼。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察思政相关知识。", "sec": "思政"}, {"id": 75, "t": "判断题", "q": "“中国梦”的核心目标是实现中华民族的伟大复兴。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察思政相关知识。", "sec": "思政"}, {"id": 76, "t": "判断题", "q": "我国宪法规定的公民的基本义务包括遵守宪法和法律、维护国家安全、荣誉和利益、保卫祖国、尊重社会公德、参加劳动和社会公益活动、接受教育。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察思政相关知识。", "sec": "思政"}, {"id": 77, "t": "判断题", "q": "党的领导是中国特色社会主义制度最本质的特征。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察思政相关知识。", "sec": "思政"}, {"id": 78, "t": "判断题", "q": "中国特色社会主义最本质的特征是中国共产党领导。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察思政相关知识。", "sec": "思政"}, {"id": 79, "t": "判断题", "q": "社会主义核心价值观把涉及国家、社会、公民的价值要求融为一体。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察思政相关知识。", "sec": "思政"}, {"id": 80, "t": "判断题", "q": "2025年，我国在人工智能领域的专利申请量位居世界第一。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察思政相关知识。", "sec": "思政"}, {"id": 81, "t": "判断题", "q": "实事求是是毛泽东思想的精髓。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察思政相关知识。", "sec": "思政"}, {"id": 82, "t": "判断题", "q": "我国社会主要矛盾的变化改变了我国社会主义所处的历史阶段。A、正确", "opts": ["B. 错误"], "a": "B", "e": "该说法错误。本题考察思政相关知识。", "sec": "思政"}, {"id": 83, "t": "判断题", "q": "创新是引领发展的第一动力。", "opts": ["A ": ["A. 正确", "B. 错误"], "a": "A", "e": "“保障人民所有利益””这句话不准确，法律保障的是 人民的合法权益，而非所有利益。法律保护公民的合法 权益，即符合法律规定的权利和利益", "sec": "思政"}, {"id": 98, "t": "判断题", "q": "社会稳定是民族复兴的根基。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察思政相关知识。", "sec": "思政"}, {"id": 99, "t": "判断题", "q": "2025年，国际货币基金组织将人民币纳入特别提款权（SDR）货币篮子的权重进一步提高。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察思政相关知识。", "sec": "思政"}, {"id": 100, "t": "判断题", "q": "2025 年我国提出的“海洋强国”战略主要侧重于海洋资源开发。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "“海洋强国”战略是一个综合性的战略， 不仅包括海洋资源开发，还涵盖海洋经济 发展、海洋环境保护、海洋科技进步、海 洋权益维护等多个方面。", "sec": "思政"}, {"id": 1, "t": "单选题", "q": "因故不能如期报到注册者，须凭有关证明，向学校申请延期注册，对于开学（）内不到校注册，也不办理延期注册手续者，取消入学资格。", "opts": ["A. 一周", "B. 两周", "C. 一个月", "D. 三个月"], "a": "B", "e": "本题考察校纪校规相关知识。正确答案为B。\n选项分析：\n❌ A. 一周 ← 排除\n✅ B. 两周 ← 正确答案\n❌ C. 一个月 ← 排除\n❌ D. 三个月 ← 排除", "sec": "校纪校规"}, {"id": 2, "t": "单选题", "q": "新生在入学后的（）内，应接受学校复查。经查证不符合报考、录取，或身体不符合标准者，由学校报请所在地省辖市人力资源保障部门批准，取消学籍，退回原地区。", "opts": ["A. 一个月", "B. 两个月", "C. 三个月", "D. 六个月"], "a": "C", "e": "本题考察校纪校规相关知识。正确答案为C。\n选项分析：\n❌ A. 一个月 ← 排除\n❌ B. 两个月 ← 排除\n✅ C. 三个月 ← 正确答案\n❌ D. 六个月 ← 排除", "sec": "校纪校规"}, {"id": 3, "t": "单选题", "q": "一个学期内累计旷课（）节及以上者，予以退学。", "opts": ["A. 20", "B. 40", "C. 60", "D. 80"], "a": "C", "e": "本题考察校纪校规相关知识。正确答案为C。\n选项分析：\n❌ A. 20 ← 排除\n❌ B. 40 ← 排除\n✅ C. 60 ← 正确答案\n❌ D. 80 ← 排除", "sec": "校纪校规"}, {"id": 4, "t": "单选题", "q": "周日至周四的晚熄灯时间为（）。", "opts": ["A. 22:00", "B. 22:30", "C. 23:00", "D. 23:30"], "a": "B", "e": "本题考察校纪校规相关知识。正确答案为B。\n选项分析：\n❌ A. 22:00 ← 排除\n✅ B. 22:30 ← 正确答案\n❌ C. 23:00 ← 排除\n❌ D. 23:30 ← 排除", "sec": "校纪校规"}, {"id": 5, "t": "单选题", "q": "有一人夜不归宿班级当天纪律考核分做多少分处理（）。", "opts": ["A. 9.8", "B. 9.5", "C. 9.0", "D. 8.0"], "a": "D", "e": "本题考察校纪校规相关知识。正确答案为D。\n选项分析：\n❌ A. 9.8 ← 排除\n❌ B. 9.5 ← 排除\n❌ C. 9.0 ← 排除\n✅ D. 8.0 ← 正确答案", "sec": "校纪校规"}, {"id": 6, "t": "单选题", "q": "凡学生在上课时间不得进入宿舍，特殊情况需（）同意方可进入。", "opts": ["A. 班主任或教务部", "B. 班长", "C. 任课老师", "D. 无需"], "a": "A", "e": "本题考察校纪校规相关知识。正确答案为A。\n选项分析：\n✅ A. 班主任或教务部 ← 正确答案\n❌ B. 年内不得评优", "B. 一学年内不得任学生干部", "C. 一学期内不得任学生干部", "D. 一学期内不得评优"], "a": "AB", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 一学年内不得评优 ← 正确\n✅ B. 一学年内不得任学生干部 ← 正确\n❌ C. 一学期内不得任学生干部 ← 不属于\n❌ D. 一学期内不得评优 ← 不属于\n因此正确答案为AB。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 58, "t": "多选题", "q": "考试作弊者，视情节轻重，给予（）处分或（）处分。", "opts": ["A. 警告", "B. 严重警告", "C. 记过", "D. 留校察看"], "a": "CD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n❌ A. 警告 ← 不属于\n❌ B. 严重警告 ← 不属于\n✅ C. 记过 ← 正确\n✅ D. 留校察看 ← 正确\n因此正确答案为CD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 59, "t": "多选题", "q": "有以下哪些行为的，可给予开除学籍处分（）。", "opts": ["A. 由他人代替考试", "B. 替他人参加考试", "C. 组织作弊", "D. 使用通讯设备作弊"], "a": "ABCD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 由他人代替考试 ← 正确\n✅ B. 替他人参加考试 ← 正确\n✅ C. 组织作弊 ← 正确\n✅ D. 使用通讯设备作弊 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 60, "t": "多选题", "q": "处分决定作出后, 班主任应通知学生家长，处分决定书一式三份，分别是（）。", "opts": ["A. 班主任留存", "B. 学生本人留存", "C. 存入学生档案", "D. 张贴公示"], "a": "BCD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n❌ A. 班主任留存 ← 不属于\n✅ B. 学生本人留存 ← 正确\n✅ C. 存入学生档案 ← 正确\n✅ D. 张贴公示 ← 正确\n因此正确答案为BCD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 61, "t": "多选题", "q": "对打架斗殴者，除承担受害者必要的费用外（医疗费、医药费、损失费）作如下处理（）。", "opts": ["A. 对策划者：策划他人打架者给予记过处分，造成严重后果者，给予留校察看以上处分。", "B. 对打架者：动手打人者视其情节给予记过以上处分,造成伤害者视其情节及后果给予留校察看以上的处分", "C. 对参与者：以“劝架”为名偏袒一方，促使斗殴事态发展造成后果者，给予严重警告或记过处分", "D. 对作伪证者：在场目击者而故意为他人作伪证，使调查造成困难者，给予严重警告或记过处分"], "a": "ABCD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 对策划者：策划他人打架者给予记过处分，造成严重后果者，给予留校察看以上处分。 ← 正确\n✅ B. 对打架者：动手打人者视其情节给予记过以上处分,造成伤害者视其情节及后果给予留校察看以上的处分 ← 正确\n✅ C. 对参与者：以“劝架”为名偏袒一方，促使斗殴事态发展造成后果者，给予严重警告或记过处分 ← 正确\n✅ D. 对作伪证者：在场目击者而故意为他人作伪证，使调查造成困难者，给予严重警告或记过处分 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 62, "t": "多选题", "q": "违反校纪者，有下列情形之一，应从重处分（）。", "opts": ["A. 认错态度不好者", "B. 在校期间已受过处分者", "C. 能主动承认错误，如实反映错误事实，检查认真深刻，有悔改表现", "D. 对检举揭发人、证人或工作人员威胁恐吓，打击报复者"], "a": "ABD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 认错态度不好者 ← 正确\n✅ B. 在校期间已受过处分者 ← 正确\n❌ C. 能主动承认错误，如实反映错误事实，检查认真深刻，有悔改表现 ← 不属于\n✅ D. 对检举揭发人、证人或工作人员威胁恐吓，打击报复者 ← 正确\n因此正确答案为ABD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 63, "t": "多选题", "q": "以下荣誉称号每学期可评的有（）。", "opts": ["A. 先进班集体", "B. 邮校之星", "C. 优秀学生干部", "D. 三好学生"], "a": "ACD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 先进班集体 ← 正确\n❌ B. 邮校之星 ← 不属于\n✅ C. 优秀学生干部 ← 正确\n✅ D. 三好学生 ← 正确\n因此正确答案为ACD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 64, "t": "多选题", "q": "学期操行等级根据学期内月平均分，分为四个等级。优、良、中、差。以下正确的有（）。", "opts": ["A. 优：90—100分", "B. 良：74—89分", "C. 中：60—75分", "D. 差：60分以下"], "a": "AD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 优：90—100分 ← 正确\n❌ B. 良：74—89分 ← 不属于\n❌ C. 中：60—75分 ← 不属于\n✅ D. 差：60分以下 ← 正确\n因此正确答案为AD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 65, "t": "多选题", "q": "以下处理，正确的是（）。", "opts": ["A. 在校园公众场合谈恋爱有亲密行为者每次扣5－10分", "B. 不经老师允许随意带客留宿者，每次减10分", "C. 打架斗殴，每次减10－20分", "D. 凡考试违纪、情节轻微未受到通报批评或处分者，每次减10分"], "a": "ABCD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 在校园公众场合谈恋爱有亲密行为者每次扣5－10分 ← 正确\n✅ B. 不经老师允许随意带客留宿者，每次减10分 ← 正确\n✅ C. 打架斗殴，每次减10－20分 ← 正确\n✅ D. 凡考试违纪、情节轻微未受到通报批评或处分者，每次减10分 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 66, "t": "多选题", "q": "以下行为校内禁止的有（）。", "opts": ["A. 校内吸游烟", "B. 在规定的场所吸烟", "C. 打架斗殴", "D. 在宿舍内醉酒"], "a": "ACD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 校内吸游烟 ← 正确\n❌ B. 在规定的场所吸烟 ← 不属于\n✅ C. 打架斗殴 ← 正确\n✅ D. 在宿舍内醉酒 ← 正确\n因此正确答案为ACD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 67, "t": "多选题", "q": "以下行为加分的有（）。", "opts": ["A. 每月出全勤", "B. 期未考试中总分获班级前5名", "C. 学校月度先进宿舍", "D. 受到学校通报批评"], "a": "ABC", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 每月出全勤 ← 正确\n✅ B. 期未考试中总分获班级前5名 ← 正确\n✅ C. 学校月度先进宿舍 ← 正确\n❌ D. 受到学校通报批评 ← 不属于\n因此正确答案为ABC。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 68, "t": "多选题", "q": "优秀学生干部评和学生会优秀干事评比条件有（）。", "opts": ["A. 政治思想好", "B. 作风好", "C. 学习好", "D. 操行成绩等第达良好"], "a": "ABC", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 政治思想好 ← 正确\n✅ B. 作风好 ← 正确\n✅ C. 学习好 ← 正确\n❌ D. 操行成绩等第达良好 ← 不属于\n因此正确答案为ABC。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 69, "t": "多选题", "q": "关于三好学生评比，下列正确的有（）。", "opts": ["A. 个人总结", "B. 小组交流", "C. 小组提名", "D. 全班评比"], "a": "ABCD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 个人总结 ← 正确\n✅ B. 小组交流 ← 正确\n✅ C. 小组提名 ← 正确\n✅ D. 全班评比 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 70, "t": "多选题", "q": "下列评优比例正确的有（）。", "opts": ["A. 先进班集体：班级数量的15％－20％", "B. 三好学生评比比例：10%", "C. 优秀学生干部评比比例：班级5%", "D. 优秀学生干部评比比例：学生会(含干事)5%"], "a": "AC", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 先进班集体：班级数量的15％－20％ ← 正确\n❌ B. 三好学生评比比例：10% ← 不属于\n✅ C. 优秀学生干部评比比例：班级5% ← 正确\n❌ D. 优秀学生干部评比比例：学生会(含干事)5% ← 不属于\n因此正确答案为AC。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 71, "t": "多选题", "q": "哪几个选项属于学校早点名时间（）。", "opts": ["A. 7：45", "B. 7：48", "C. 7：55", "D. 8：00"], "a": "AB", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 7：45 ← 正确\n✅ B. 7：48 ← 正确\n❌ C. 7：55 ← 不属于\n❌ D. 8：00 ← 不属于\n因此正确答案为AB。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 72, "t": "多选题", "q": "哪几项属于晚自习时间（）。", "opts": ["A. 20：00", "B. 20：30", "C. 20：40", "D. 20：50"], "a": "AB", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 20：00 ← 正确\n✅ B. 20：30 ← 正确\n❌ C. 20：40 ← 不属于\n❌ D. 20：50 ← 不属于\n因此正确答案为AB。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 73, "t": "多选题", "q": "技工院校应当为取得学籍的学生及时建立学籍档案，基本内容包括（）。", "opts": ["A. 基本信息", "B. 思想品德评价材料", "C. 在校期间的奖惩材料", "D. 毕业生信息登记表"], "a": "ABCD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 基本信息 ← 正确\n✅ B. 思想品德评价材料 ← 正确\n✅ C. 在校期间的奖惩材料 ← 正确\n✅ D. 毕业生信息登记表 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 74, "t": "多选题", "q": "对下列情况之一的，予以退学（）。", "opts": ["A. 学生每学期有四门及以上课程考核不合格者", "B. 一个学期内累计旷课60节课及以上", "C. 休学期满不办理复学手续者", "D. 经留级的学生仍不达到升学条件者"], "a": "BCD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n❌ A. 学生每学期有四门及以上课程考核不合格者 ← 不属于\n✅ B. 一个学期内累计旷课60节课及以上 ← 正确\n✅ C. 休学期满不办理复学手续者 ← 正确\n✅ D. 经留级的学生仍不达到升学条件者 ← 正确\n因此正确答案为BCD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 75, "t": "多选题", "q": "对于违规违纪的学生，学校可视情节轻重，给予批评教育或纪律处分，纪律处分分为（）。", "opts": ["A. 警告", "B. 严重警告", "C. 记过", "D. 开除学籍"], "a": "ABCD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 警告 ← 正确\n✅ B. 严重警告 ← 正确\n✅ C. 记过 ← 正确\n✅ D. 开除学籍 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 76, "t": "多选题", "q": "树立宿舍内安全防范意识，注意（）等。", "opts": ["A. 防火", "B. 防盗", "C. 防意外事故", "D. 防自然灾害"], "a": "ABCD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 防火 ← 正确\n✅ B. 防盗 ← 正确\n✅ C. 防意外事故 ← 正确\n✅ D. 防自然灾害 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 77, "t": "多选题", "q": "学生宿舍的一切固定设施，未经教务部同意不得随意（）。", "opts": ["A. 拆除", "B. 移位", "C. 改装", "D. 爱护保养"], "a": "ABC", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 拆除 ← 正确\n✅ B. 移位 ← 正确\n✅ C. 改装 ← 正确\n❌ D. 爱护保养 ← 不属于\n因此正确答案为ABC。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 78, "t": "多选题", "q": "学生必须自觉服从（）的管理，对不服从管理者，学生管理部门将视情节轻重给予纪律处分。", "opts": ["A. 老师", "B. 学生会纪检人员", "C. 宿舍长", "D. 玉皇大帝"], "a": "ABC", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 老师 ← 正确\n✅ B. 学生会纪检人员 ← 正确\n✅ C. 宿舍长 ← 正确\n❌ D. 玉皇大帝 ← 不属于\n因此正确答案为ABC。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 79, "t": "多选题", "q": "建设（）的宿舍是学校和广大学生共同目标和责任。", "opts": ["A. 安全", "B. 文明", "C. 温馨", "D. 优雅"], "a": "ABCD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 安全 ← 正确\n✅ B. 文明 ← 正确\n✅ C. 温馨 ← 正确\n✅ D. 优雅 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 80, "t": "多选题", "q": "宿舍内不私拉乱接电源，不使用（）、（）、（）、（）、电熨斗、电烙铁，电热水器等违章、大功率电器。", "opts": ["A. 电炉", "B. 电热褥", "C. 电热杯", "D. 电饭锅"], "a": "ABCD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 电炉 ← 正确\n✅ B. 电热褥 ← 正确\n✅ C. 电热杯 ← 正确\n✅ D. 电饭锅 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 81, "t": "多选题", "q": "学生宿舍不应堆放（）、（）。", "opts": ["A. 四季衣物", "B. 一般生活垃圾", "C. 易燃杂物", "D. 废品"], "a": "CD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n❌ A. 四季衣物 ← 不属于\n❌ B. 一般生活垃圾 ← 不属于\n✅ C. 易燃杂物 ← 正确\n✅ D. 废品 ← 正确\n因此正确答案为CD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 82, "t": "多选题", "q": "不散布、传播不健康的言论，不观看、收藏不健康的书籍、（）、（）、（）、（），自觉抵制黄色及反动等不良信息；严禁涉及隐私的拍摄和传播。", "opts": ["A. 报刊", "B. 杂志", "C. 视频", "D. 光碟"], "a": "ABCD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 报刊 ← 正确\n✅ B. 杂志 ← 正确\n✅ C. 视频 ← 正确\n✅ D. 光碟 ← 正确\n因此正确答案为ABCD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 83, "t": "多选题", "q": "初起火灾的扑救原则是（）。", "opts": ["A. 救人第一和集中兵力的原则", "B. 先高层楼，后低层楼的原则", "C. 先控制后消灭", "D. 先重点，后一般的原则"], "a": "ACD", "e": "本题考察校纪校规相关知识，需全面掌握。\n逐项分析：\n✅ A. 救人第一和集中兵力的原则 ← 正确\n❌ B. 先高层楼，后低层楼的原则 ← 不属于\n✅ C. 先控制后消灭 ← 正确\n✅ D. 先重点，后一般的原则 ← 正确\n因此正确答案为ACD。多选题需全部选对才得分。", "sec": "校纪校规"}, {"id": 84, "t": "判断题", "q": "晚自习检查中，所在班级无任何违纪现象，满分9.8（基本分8分），起评分为8。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 85, "t": "判断题", "q": "晚自习期间，教室吵闹声音大，扣0.4分（原则上1人讲话0.1分/人）,教室吵闹视情节轻重扣2-3分，吵闹超过4次（含）则按基本分8分处理。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 86, "t": "判断题", "q": "自习期间睡觉、饮食传纸条、使用电子产品、做与学习无关事项扣0.2分/人。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 87, "t": "判断题", "q": "教学日迟到早退扣0.3分/人，超过10分钟记旷课，扣1分/人。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 88, "t": "判断题", "q": "自习期间言行侮辱纪检人员，故意顶撞值班老师或纪检人员的合理劝告，按基本分8分处理，并记录在案，报学生管理部门后续处理。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 89, "t": "判断题", "q": "自习课请假超过8人（含）该班当日晚自习为基本分为8分。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 90, "t": "判断题", "q": "班级早晚自习迟到超过5人，该班直接扣为基本分8分。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 91, "t": "判断题", "q": "学校教学区域内穿拖鞋、背心的情况，涉及考核的每人扣0.1分。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 92, "t": "判断题", "q": "教学日晚自习迟到早退扣0.1分/人，超过15分钟记旷课，扣1分/人。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 93, "t": "判断题", "q": "招生简章中明确要求的职业技能认定部门公布的在校期间的最终认定成绩（含理论和操作）没有通过的，作退学处理，不列入就业推荐名单。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 94, "t": "判断题", "q": "讲究公共卫生，注意节约用水、用电，随手关灯、关水笼头。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 95, "t": "判断题", "q": "不得将管制刀具带进宿舍。", "opts": ["A. 正确", "B. 错误"], "a": "A", "e": "该说法正确。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 96, "t": "判断题", "q": "宿舍内可以养宠物。", "opts": ["A. 正确", "B. 错误"], "a": "B", "e": "该说法错误。本题考察校纪校规相关知识。", "sec": "校纪校规"}, {"id": 97, "t": "判断题", "q": "学校宿舍中可以搬动室内设施，涂划墙壁，乱张贴，往卫生间下水道内倒污物。", "opts":
