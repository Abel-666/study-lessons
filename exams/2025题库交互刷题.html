var ms={};

// ======================== HELPERS ========================
var PR=['太棒了！🎉','答对了！👏','真厉害！💪','完美！✨','好样的！🌟','正确！🎯','优秀！🏆','厉害呀！🔥'];
var EN=['没关系，再想想！💭','加油，再来一次！💪','差一点，再试试！🎯','别灰心，重新选！🌟','仔细分析一下再选！🤔','接近了，继续！🔥'];
function pk(a){return a[Math.floor(Math.random()*a.length)]}
function li(i){return String.fromCharCode(65+i)}

function na(a){if(!a)return'';a=a.replace(/[.．]/g,'').trim().toUpperCase();if(a==='对'||a==='正确'||a==='A正确')return'A';if(a==='错'||a==='错误'||a==='B错误')return'B';return a}
function aSet(q){return new Set(na(q.a).split(''))}
function isM(q){return q.t==='多选题'}

var FM={'all':'📋 全部','储汇业务知识':'💰 储汇','寄递业务知识':'📦 寄递','行测':'📐 行测','邮政通识':'🏢 通识','思政':'🚩 思政','校纪校规':'📋 校规'};
function fs(n){return FM[n]||n}
function tl(t){var m={'单选题':'单选','多选题':'多选','判断题':'判断'};return m[t]||t}

// ======================== FILTER ========================
// Returns array of INDICES into Q (not IDs)
function fi(){
  if(s.f==='all'){
    var res=[];
    for(var i=0;i<Q.length;i++)res.push(i);
    return res;
  }
  var res=[];
  for(var i=0;i<Q.length;i++){if(Q[i].sec===s.f)res.push(i)}
  return res;
}

function bf(){
  var b=document.getElementById('fbar');
  var secs=['all'];var cnt={'all':Q.length};
  for(var i=0;i<Q.length;i++){var x=Q[i].sec||'?';cnt[x]=(cnt[x]||0)+1}
  for(var k in cnt)if(k!=='all')secs.push(k);
  var h='';
  for(var si=0;si<secs.length;si++){
    var x=secs[si];
    h+='<button class="fbtn'+(x===s.f?' on':'')+'" data-x="'+x+'">'+fs(x)+' <span style="opacity:.7;font-size:10px">'+cnt[x]+'</span></button>';
  }
  b.innerHTML=h;
  Array.from(b.children).forEach(function(btn){
    btn.onclick=function(){
      s.f=btn.dataset.x;s.i=0;ms={};
      var ids=fi();
      // Jump to first unanswered
      for(var j=0;j<ids.length;j++){if(!s.a[ids[j]]){s.i=j;break}}
      ss();bf();r();
    }
  });
}

// ======================== RENDER ========================
function r(){
  var ids=fi();
  if(!ids.length){document.getElementById('qarea').innerHTML='<div class="em"><p>📭 该模块暂无题目</p></div>';us();return}
  if(s.i>=ids.length)s.i=ids.length-1;
  var idx=ids[s.i]; // actual index into Q
  var q=Q[idx];
  if(!q)return;

  var n=s.i+1,t=ids.length,mi=isM(q),an=na(q.a),aS=aSet(q);
  var rec=s.a[idx],dn=!!rec,cr=rec&&rec.correct||false;
  var wn=(s.w[idx]||[]).length,tA=ms[idx]||[];

  // Options
  var oh='';
  for(var oi=0;oi<q.opts.length;oi++){
    var opt=q.opts[oi],l=li(oi),txt=opt.replace(/^[A-E][.、．]\s*/,''),cs='opt';
    if(cr){if(aS.has(l))cs+=' ok';cs+=' ds'}
    else if(dn&&!mi){if(l===rec.sl)cs+=' no';else if(l===an)cs+=' ok';cs+=' ds'}
    else if(dn&&mi){if(tA.indexOf(l)>=0)cs+=' tog'}
    else{if(mi&&tA.indexOf(l)>=0)cs+=' tog'}
    oh+='<div class="'+cs+'" data-i="'+idx+'" data-l="'+l+'"><span class="lt">'+l+'</span><span class="tx">'+txt+'</span></div>';
  }

  // Explanation
  var exp=q.e||'掌握该知识点即可。';
  var fb='';
  if(cr){
    fb='<div class="fb2 gd sh"><div class="pr">'+pk(PR)+'</div><div class="ex">'+exp+'</div><div class="br"><button class="bn ol" data-act="reset">🔄 重新回答此题</button></div></div>';
  }else if(dn&&!mi){
    fb='<div class="fb2 ag sh"><div class="pr">'+pk(EN)+'</div><div class="ex" style="font-size:13px;color:#888">正确答案是 '+an+'。<br>'+exp+'</div><div class="br"><button class="bn ag" data-act="reset">🔄 重新回答</button></div></div>';
  }else if(dn&&mi){
    var dt=rec.sl?'你选了 '+rec.sl.split('').join('、')+'，答案不完全正确。':'';
    fb='<div class="fb2 ag sh"><div class="pr">'+pk(EN)+'</div><div class="ex" style="font-size:13px;color:#888">'+dt+' 调整后重新提交</div><div class="br"><button class="bn ag" data-act="reset">🔄 重新回答</button></div></div>';
  }

  // Hint
  var hh='';
  if(wn>=2&&!cr){
    hh='<div class="ht">💡 <strong>提示：</strong>正确答案是 '+Array.from(aS).sort().join('、')+'。</div>';
  }

  // Confirm for multi
  var ch='';
  if(mi&&!cr){
    ch='<div class="ca"><button class="cb" data-act="confirm"'+(tA.length?'':' disabled')+'>✅ 确认提交'+(tA.length?'（已选'+tA.length+'项）':'')+'</button></div>';
  }

  document.getElementById('prog').style.width=((n/t)*100).toFixed(0)+'%';
  document.getElementById('qarea').innerHTML='<div class="qc"><div class="qh"><span class="qn">第 '+n+' / '+t+' 题</span><span class="qt2">'+tl(q.t)+' · '+fs(q.sec)+'</span></div><div class="qx">'+q.q+'</div><div class="opts">'+oh+'</div>'+hh+fb+ch+'</div><div class="nv"><button class="nb prv" data-act="prev"'+(s.i===0?' disabled':'')+'>⬅ 上一题</button><button class="nb nxt" data-act="next">'+(s.i===ids.length-1?'📋 完成':'下一题 ➡')+'</button></div>';
  us();

  // Bind events
  var area=document.getElementById('qarea');
  // Options (click delegation)
  Array.from(area.querySelectorAll('.opt:not(.ds)')).forEach(function(el){el.onclick=function(){oc(parseInt(el.dataset.i),el.dataset.l)}});
  // Reset
  Array.from(area.querySelectorAll('[data-act="reset"]')).forEach(function(el){el.onclick=rq});
  // Confirm
  var cb2=area.querySelector('[data-act="confirm"]:not([disabled])');if(cb2)cb2.onclick=cm;
  // Prev
  var pbtn=area.querySelector('[data-act="prev"]');if(pbtn)pbtn.onclick=function(){g(-1)};
  // Next
  var nbtn=area.querySelector('[data-act="next"]');if(nbtn)nbtn.onclick=function(){g(1)};
}

// ======================== INTERACT ========================
function oc(idx,l){
  var q=Q[idx];if(!q)return;
  if(s.a[idx]&&s.a[idx].correct)return;
  if(isM(q)){
    if(!ms[idx])ms[idx]=[];
    var a=ms[idx];var p=a.indexOf(l);
    if(p>=0)a.splice(p,1);else a.push(l);
    r();
  }else{
    var an2=na(q.a);var cr2=l===an2;
    s.a[idx]={sl:l,correct:cr2};
    if(!cr2){if(!s.w[idx])s.w[idx]=[];if(s.w[idx].indexOf(l)<0)s.w[idx].push(l)}
    ss();r();
  }
}

function cm(){
  var ids=fi();if(!ids.length)return;
  var idx=ids[s.i];var q=Q[idx];if(!q)return;
  var a=ms[idx]||[];if(!a.length)return;
  var aS=aSet(q);var sn=new Set(a);
  var cr2=true;sn.forEach(function(l){if(!aS.has(l))cr2=false});
  if(sn.size!==aS.size)cr2=false;
  if(cr2){
    s.a[idx]={sl:a.join(''),correct:true};
    delete ms[idx];ss();r();
  }else{
    s.a[idx]={sl:a.join(''),correct:false};
    if(!s.w[idx])s.w[idx]=[];s.w[idx].push(a.join(''));
    ss();r();
  }
}

function rq(){
  var ids=fi();if(!ids.length)return;
  var idx=ids[s.i];
  delete s.a[idx];delete ms[idx];ss();r();
}

function g(d){
  var ids=fi();
  s.i=Math.max(0,Math.min(ids.length-1,s.i+d));
  ss();r();
}

function jumpTo(){
  var inp=document.getElementById('jmp');var v=parseInt(inp.value);
  if(isNaN(v)||v<1)return;var ids=fi();
  if(v>=1&&v<=ids.length){s.i=v-1;ss();r();inp.value=''}
}

function us(){
  var ids=fi();var dn=0,cr=0;
  for(var i=0;i<ids.length;i++){var id=ids[i];if(s.a[id]){dn++;if(s.a[id].correct)cr++}}
  document.getElementById('stxt').innerHTML='已完成 <span class="dn">'+dn+'</span> / '+ids.length+' 题 · 正确 <span class="dn">'+cr+'</span> 题 · 待做 <span class="rm">'+(ids.length-dn)+'</span> 题';
}

// Keyboard
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft')g(-1);
  if(e.key==='ArrowRight')g(1);
  if('12345'.indexOf(e.key)>=0){var o=document.querySelectorAll('.opt:not(.ds)');if(o[parseInt(e.key)-1])o[parseInt(e.key)-1].click()}
  if(e.key==='Enter'){var cb3=document.querySelector('.cb:not([disabled])');if(cb3)cb3.click()}
});

bf();r();
</script>
</body>
</html>
